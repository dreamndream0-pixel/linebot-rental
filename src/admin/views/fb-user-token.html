<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Facebook 個人授權 Token</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f7f5f1; color: #1f2a24; }
    .wrap { max-width: 760px; margin: 42px auto; padding: 0 18px; }
    .card { background: #fff; border: 1px solid #e5e0d5; border-radius: 18px; padding: 24px; box-shadow: 0 12px 32px rgba(30, 38, 32, .08); }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { color: #6b716b; line-height: 1.7; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
    button, a.btn { border: none; border-radius: 12px; padding: 12px 18px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-block; }
    .primary { background: #1877f2; color: #fff; }
    .sage { background: #7ea081; color: #fff; }
    .ghost { background: #ede8e0; color: #39423b; }
    .danger { background: #c0524a; color: #fff; }
    .box { margin-top: 18px; background: #fbfaf7; border: 1px solid #eee8de; border-radius: 14px; padding: 14px; }
    input { border: 1px solid #e5e0d5; border-radius: 12px; padding: 12px 14px; min-width: 260px; font-size: 15px; }
    .muted { color: #8b8b86; font-size: 13px; }
    .ok { color: #2e7d32; font-weight: 700; }
    .bad { color: #c0524a; font-weight: 700; }
    .token { word-break: break-all; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; background: #f2eee7; border-radius: 10px; padding: 10px; margin-top: 6px; }
    ul { margin: 8px 0 0 20px; padding: 0; color: #555; }
    li { margin: 5px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Facebook 個人授權 Token</h1>
      <p>這是獨立用途頁面，只保存 Facebook 個人 user token，用來記住房東授權身分與之後重抓粉專清單。不會改動原本社群管理或粉專發文設定。</p>
      <div class="box">
        <div class="muted">後台金鑰</div>
        <div class="row" style="margin-top:8px;">
          <input id="adminKey" type="password" placeholder="貼上房東後台金鑰">
          <button class="ghost" onclick="saveKey()">儲存金鑰</button>
        </div>
        <div class="muted" style="margin-top:10px;">Callback URL 請加入 Meta App 的 Valid OAuth Redirect URIs：</div>
        <div id="callbackUrl" style="word-break:break-all;margin-top:4px;font-weight:700;"></div>
      </div>
      <div id="status" class="box muted">讀取中...</div>
      <div id="links" class="box muted">授權連結讀取中...</div>
      <div class="row">
        <button class="primary" onclick="connectFbUser()">連結 / 重新授權 Facebook</button>
        <button class="sage" onclick="refreshPages()">重抓粉專清單</button>
        <button class="danger" onclick="disconnect()">刪除保存 token</button>
        <a class="btn ghost" href="/admin">回後台</a>
      </div>
      <p class="muted">這個頁面不放在網站選單內；金鑰只存在此手機瀏覽器的 sessionStorage。</p>
    </div>
  </div>
  <script>
    async function api(path, options) {
      const opt = options || {}
      opt.headers = Object.assign({}, opt.headers || {}, authHeaders())
      const res = await fetch(path, opt)
      const data = await res.json().catch(function(){ return {} })
      if (!res.ok) throw new Error(data.error || res.status)
      return data
    }
    function authHeaders() {
      const key = sessionStorage.getItem('fbUserTokenAdminKey') || ''
      return key ? { 'X-Admin-Key': key } : {}
    }
    function saveKey() {
      const key = document.getElementById('adminKey').value.trim()
      if (!key) { alert('請輸入後台金鑰'); return }
      sessionStorage.setItem('fbUserTokenAdminKey', key)
      loadStatus()
    }
    function fmtDate(v) {
      return v ? new Date(v).toLocaleString('zh-TW') : '未提供'
    }
    function render(data) {
      const el = document.getElementById('status')
      if (!data.connected) {
        el.innerHTML = '<div class="bad">尚未保存 Facebook user token</div>'
        return
      }
      const pages = (data.pages || []).map(function(p){ return '<li>' + escapeHtml(p.name || '') + ' <span class="muted">(' + escapeHtml(p.id || '') + ')</span></li>' }).join('')
      el.innerHTML =
        '<div class="ok">已保存 Facebook 個人授權</div>' +
        '<div style="margin-top:8px;">帳號：' + escapeHtml(data.fbName || '-') + '</div>' +
        '<div>Facebook ID：' + escapeHtml(data.fbUserId || '-') + '</div>' +
        '<div>Token：' + escapeHtml(data.tokenPreview || '已保存') + '</div>' +
        '<div>到期時間：' + fmtDate(data.tokenExpiresAt) + '</div>' +
        '<div class="muted" style="margin-top:10px;">可讀取粉專清單：</div>' +
        '<ul>' + (pages || '<li>目前沒有粉專資料</li>') + '</ul>'
    }
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
        return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[c]
      })
    }
    async function loadStatus() {
      try {
        document.getElementById('callbackUrl').textContent = location.origin + '/admin/api/fb-user-token/callback'
        document.getElementById('adminKey').value = sessionStorage.getItem('fbUserTokenAdminKey') || ''
        if (!sessionStorage.getItem('fbUserTokenAdminKey')) {
          document.getElementById('status').innerHTML = '<div class="bad">請先輸入後台金鑰</div>'
          return
        }
        render(await api('/admin/api/fb-user-token/status'))
        await loadLinks()
      } catch(e) {
        document.getElementById('status').innerHTML = '<div class="bad">讀取失敗：' + escapeHtml(e.message) + '</div>'
      }
    }
    async function loadLinks() {
      try {
        const data = await api('/admin/api/fb-user-token/links')
        const items = data.items || []
        document.getElementById('links').innerHTML = '<div style="font-weight:700;margin-bottom:8px;">房東授權連結 / Token</div>' + (items.map(renderLinkItem).join('') || '<div class="muted">沒有房東資料</div>')
      } catch(e) {
        document.getElementById('links').innerHTML = '<div class="bad">授權連結讀取失敗：' + escapeHtml(e.message) + '</div>'
      }
    }
    function renderLinkItem(item) {
      const token = item.token && item.token.userToken ? item.token.userToken : ''
      const connected = item.token && item.token.connected
      return '<div style="border-top:1px solid #eee0d2;padding:12px 0;">' +
        '<div style="font-weight:700;">' + escapeHtml(item.name || '-') + ' <span class="muted">' + escapeHtml(item.email || '') + '</span></div>' +
        '<div class="muted" style="margin-top:6px;">給房東的授權連結</div>' +
        '<div class="token">' + escapeHtml(item.authUrl || '') + '</div>' +
        '<button class="ghost" style="margin-top:8px;padding:8px 12px;" onclick="copyText(\'' + jsString(item.authUrl || '') + '\')">複製授權連結</button>' +
        '<div class="muted" style="margin-top:10px;">EAA User Token：' + (connected ? '<span class="ok">已取得</span>' : '<span class="bad">尚未取得</span>') + '</div>' +
        (token ? '<div class="token">' + escapeHtml(token) + '</div><button class="ghost" style="margin-top:8px;padding:8px 12px;" onclick="copyText(\'' + jsString(token) + '\')">複製 Token</button>' : '') +
      '</div>'
    }
    function jsString(s) {
      return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n')
    }
    function copyText(s) {
      if (navigator.clipboard) navigator.clipboard.writeText(s).then(function(){ alert('已複製') })
      else prompt('請複製：', s)
    }
    async function connectFbUser() {
      try {
        if (!sessionStorage.getItem('fbUserTokenAdminKey')) { alert('請先輸入並儲存後台金鑰'); return }
        const t = await api('/admin/api/fb-user-token/oauth-ticket', { method: 'POST' })
        window.open('/admin/api/fb-user-token/connect?ticket=' + encodeURIComponent(t.ticket), 'fb_user_token_oauth', 'width=560,height=720')
      } catch(e) {
        alert('無法開始授權：' + e.message)
      }
    }
    async function refreshPages() {
      try {
        await api('/admin/api/fb-user-token/refresh-pages', { method: 'POST' })
        await loadStatus()
      } catch(e) {
        alert('重抓失敗：' + e.message)
      }
    }
    async function disconnect() {
      if (!confirm('確定刪除保存的 Facebook user token？')) return
      try {
        await api('/admin/api/fb-user-token/disconnect', { method: 'POST' })
        await loadStatus()
      } catch(e) {
        alert('刪除失敗：' + e.message)
      }
    }
    window.addEventListener('message', function(ev) {
      if (ev.data && ev.data.type === 'fb-user-token-oauth-done') setTimeout(loadStatus, 500)
    })
    loadStatus()
  </script>
</body>
</html>
