function toggleUtilMode() {
  var sel = document.getElementById('l_utilMode')
  if (!sel) return
  document.getElementById('utilMeterBox').style.display = sel.value === 'METER' ? 'block' : 'none'
  updateMeterCalc()
}
function updateMeterCalc() {
  var el = document.getElementById('meterCalc')
  if (!el) return
  var cur = parseFloat(val('l_meterCurrent')) || 0
  var nxt = parseFloat(val('l_meterNext')) || 0
  var rate = parseFloat(val('l_meterRate')) || 0
  var deg = Math.max(0, nxt - cur)
  el.textContent = '用量 ' + deg + ' 度 × ' + rate + ' 元 ＝ NT$ ' + Math.round(deg * rate).toLocaleString()
}

function closeLeaseModal() { var m = document.getElementById('leaseModal'); if (m) m.remove() }

async function uploadLeaseFile(input) {
  if (!input.files || !input.files[0]) return
  var statusEl = document.getElementById('l_file_status')
  if (statusEl) statusEl.textContent = '上傳中...'
  var fd = new FormData(); fd.append('file', input.files[0])
  try {
    var res = await fetch('/admin/api/upload?key=' + encodeURIComponent(KEY), { method: 'POST', body: fd })
    if (!res.ok) { if (statusEl) statusEl.textContent = '❌ 失敗'; return }
    var data = await res.json()
    _uploadedLeaseFile = data.url
    if (statusEl) statusEl.textContent = '✅ 已上傳'
  } catch (e) { if (statusEl) statusEl.textContent = '❌ 失敗' }
}

async function saveLease(leaseId) {
  // 從選的租客取得 lineUserId
  var tenantSel = document.getElementById('l_lineTenantId')
  var lineTenantId = tenantSel ? tenantSel.value : ''
  var lineUserId = ''
  if (lineTenantId && MANAGED_OPTS.tenants) {
    var t = MANAGED_OPTS.tenants.find(function(x){ return x.id === lineTenantId })
    if (t) lineUserId = t.lineUserId || ''
  }

  var body = {
    tenantName: val('l_tenantName'), tenantPhone: val('l_tenantPhone'), tenantIdNo: val('l_tenantIdNo'),
    roomLabel: val('l_roomLabel'), rent: val('l_rent'), deposit: val('l_deposit'),
    leaseStart: val('l_leaseStart'), leaseEnd: val('l_leaseEnd'),
    status: document.getElementById('l_status').value,
    propertyId: document.getElementById('l_propertyId').value,
    lineTenantId: lineTenantId,
    lineUserId: lineUserId,
    rentPayDay: val('l_rentPayDay'),
    rentRemindOn: document.getElementById('l_rentRemindOn').checked,
    utilPayDay: val('l_utilPayDay'),
    utilRemindOn: document.getElementById('l_utilRemindOn').checked,
    utilAmount: val('l_utilAmount'),
    utilMode: document.getElementById('l_utilMode') ? document.getElementById('l_utilMode').value : 'FIXED',
    meterReadDate: val('l_meterReadDate'),
    meterCurrent: val('l_meterCurrent'),
    meterNext: val('l_meterNext'),
    meterRate: val('l_meterRate'),
  }
  // 按電表模式：水電金額自動以「用量 × 費率」計算
  if (body.utilMode === 'METER') {
    var deg = Math.max(0, (parseFloat(body.meterNext) || 0) - (parseFloat(body.meterCurrent) || 0))
    body.utilAmount = String(Math.round(deg * (parseFloat(body.meterRate) || 0)))
  }
  if (!body.tenantName) { showToast('❌ 承租人姓名必填'); return }
  if (leaseId) body.leaseId = leaseId
  if (_uploadedLeaseFile) body.contractFile = _uploadedLeaseFile

  var res = await fetch('/admin/api/managed/' + MANAGED.current.id + '/lease?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  })
  if (!res.ok) { showToast('❌ 儲存失敗'); return }
  showToast('✅ 租約已儲存')
  closeLeaseModal()
  openContractManager(MANAGED.current.id)
}

async function deleteLease(leaseId) {
  if (!confirm('確定刪除此租約？')) return
  var res = await fetch('/admin/api/managed/lease/' + leaseId + '?key=' + encodeURIComponent(KEY), { method: 'DELETE' })
  if (!res.ok) { showToast('❌ 刪除失敗'); return }

async function loadExpiringReminders() {
  try {
    var res = await fetch('/admin/api/managed-expiring?key=' + encodeURIComponent(KEY) + '&days=30')
    if (!res.ok) return ''
    var data = await res.json()
    var all = (data.managed || []).concat(data.leases || [])
    if (all.length === 0) return ''
    var items = all.map(function(x) {
      var days = Math.ceil((new Date(x.endDate) - new Date()) / 86400000)
      return '<div style="display:flex;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #F0E8D8;font-size:13px;">' +
        '<span>' + (x.type === '租約' ? '🏠' : '📋') + ' ' + esc(x.title) + (x.room ? '（' + esc(x.room) + '）' : '') + ' — ' + esc(x.who) + '</span>' +
        '<span style="color:#E5A33C;font-weight:700;">' + days + ' 天後到期</span>' +
      '</div>'
    }).join('')
    return '<div style="background:#FFF8EC;border:1px solid #F0D9A8;border-radius:12px;padding:14px;margin-bottom:18px;">' +
      '<div style="font-weight:700;font-size:14px;margin-bottom:8px;color:#B07D1E;">⏰ 即將到期合約（30 天內）</div>' + items + '</div>'
  } catch (e) { return '' }
}

    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;">' +
      '<h3 style="margin:0;font-size:16px;">📋 代管清單（依房東分類）</h3>' +
      '<button onclick="document.getElementById(\'managedReportBox\').innerHTML=\'\'" style="border:none;background:none;font-size:18px;cursor:pointer;color:#999;">×</button>' +
    '</div>' +
    '<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;">' +
      tabBtn('active', '承租中', counts.active, '#4A8A4A') +
      tabBtn('expiring', '即將到期', counts.expiring, '#E5A33C') +
      tabBtn('expired', '已到期', counts.expired, '#C0524A') +
      tabBtn('ended', '已終止', counts.ended, '#888') +
    '</div>' +
    groupsHtml +
    '</div>'
}

// 該房客「合約期間」的收支明細（從代管清單的「對帳」開啟）
async function openLeaseLedger(leaseId) {
  var d = MANAGED.leaseList || {}
  var all = (d.active || []).concat(d.expiring || [], d.expired || [], d.ended || [])
  var l = all.filter(function(x){ return x.id === leaseId })[0]
  if (!l) { showToast('❌ 找不到租約'); return }

  var res = await fetch('/admin/api/managed/' + l.managedId + '?key=' + encodeURIComponent(KEY))
  if (!res.ok) { showToast('❌ 載入失敗'); return }
  var mp = await res.json()
  var recs = mp.incomes || []
  var start = l.leaseStart ? new Date(l.leaseStart) : null
  var end = l.leaseEnd ? new Date(l.leaseEnd) : null
  var inPeriod = recs.filter(function(r){
    var dt = new Date(r.recordDate)
    if (start && dt < start) return false
    if (end && dt > end) return false
    return true
  })
  var income = inPeriod.filter(function(r){ return r.type === 'INCOME' }).reduce(function(s,r){ return s + r.amount }, 0)
  var expense = inPeriod.filter(function(r){ return r.type === 'EXPENSE' }).reduce(function(s,r){ return s + r.amount }, 0)
  function fmt(dt){ return dt ? new Date(dt).toLocaleDateString('zh-TW') : '—' }
  var catLabel = { RENT:'租金', REPAIR:'維修', UTILITY:'水電', OTHER:'其他' }
  var rows = inPeriod.map(function(r){
    return '<tr><td style="padding:8px;font-size:12px;">' + fmt(r.recordDate) + '</td>' +
      '<td style="padding:8px;font-size:12px;">' + (catLabel[r.category] || r.category) + '</td>' +
      '<td style="padding:8px;font-size:13px;color:' + (r.type === 'INCOME' ? '#2E7D32' : '#C0524A') + ';">' + (r.type === 'INCOME' ? '+' : '−') + ' NT$ ' + Number(r.amount).toLocaleString() + '</td>' +
      '<td style="padding:8px;font-size:12px;color:#888;">' + esc(r.description || '') + '</td></tr>'
  }).join('') || '<tr><td colspan="4" style="padding:16px;text-align:center;color:#aaa;">此合約期間尚無收支紀錄</td></tr>'

  var html = '<div id="leaseLedgerModal" class="modal-bg" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:320;display:flex;align-items:flex-start;justify-content:center;overflow-y:auto;padding:20px;">' +
    '<div style="background:#fff;border-radius:16px;padding:24px;max-width:620px;width:100%;margin:auto;">' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">' +
      '<div>' +
        '<div style="font-size:13px;color:#999;">房東 ' + esc(l.ownerName || '') + '</div>' +
        '<h3 style="margin:2px 0;">' + esc(l.managedTitle || '') + '</h3>' +
        '<div style="font-size:13px;color:#555;margin-top:4px;">🧑 房客：' + esc(l.tenantName) + (l.roomLabel ? '（' + esc(l.roomLabel) + '）' : '') + '</div>' +
        '<div style="font-size:12px;color:#888;">租約：' + fmt(l.leaseStart) + ' ~ ' + fmt(l.leaseEnd) + '・月租 NT$ ' + Number(l.rent).toLocaleString() + '</div>' +
      '</div>' +
      '<button onclick="document.getElementById(\'leaseLedgerModal\').remove()" style="border:none;background:none;font-size:22px;cursor:pointer;">×</button>' +
    '</div>' +
    '<div style="display:flex;gap:10px;margin:14px 0;">' +
      '<div style="flex:1;background:#F0F7F1;border-radius:10px;padding:10px;text-align:center;"><div style="font-size:11px;color:#888;">收入</div><div style="font-weight:700;color:#2E7D32;">NT$ ' + income.toLocaleString() + '</div></div>' +
      '<div style="flex:1;background:#FBF0EF;border-radius:10px;padding:10px;text-align:center;"><div style="font-size:11px;color:#888;">支出</div><div style="font-weight:700;color:#C0524A;">NT$ ' + expense.toLocaleString() + '</div></div>' +
      '<div style="flex:1;background:#F5F0EA;border-radius:10px;padding:10px;text-align:center;"><div style="font-size:11px;color:#888;">淨額</div><div style="font-weight:700;">NT$ ' + (income - expense).toLocaleString() + '</div></div>' +
    '</div>' +
    '<div style="overflow-x:auto;border:1px solid #EEE;border-radius:8px;"><table style="width:100%;border-collapse:collapse;"><thead><tr style="background:#F5F0EA;"><th style="padding:8px;text-align:left;font-size:12px;">日期</th><th style="padding:8px;text-align:left;font-size:12px;">類別</th><th style="padding:8px;text-align:left;font-size:12px;">金額</th><th style="padding:8px;text-align:left;font-size:12px;">說明</th></tr></thead><tbody>' + rows + '</tbody></table></div>' +
    '<div style="font-size:11px;color:#aaa;margin-top:10px;">＊此為該委託物業在合約期間（' + fmt(l.leaseStart) + '～' + fmt(l.leaseEnd) + '）的收支。新增收支請到該物業「明細對帳」。</div>' +
    '</div></div>'
  var ex = document.getElementById('leaseLedgerModal'); if (ex) ex.remove()
  document.body.insertAdjacentHTML('beforeend', html)
}

</script>
</body>
</html>`
