    sad:'<circle cx="12" cy="12" r="9"/><path d="M9 10h.01M15 10h.01M8 17a5 5 0 0 1 8 0"/>',
    share:'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 10.5 15.4 6.5M8.6 13.5 15.4 17.5"/>'
  }
  return paths[name] || paths.circle
}

function uiIconMarkup(emoji) {
  var name = UI_ICON_MAP[emoji] || UI_ICON_MAP[emoji.replace(/\uFE0F/g, '')]
  if (!name) return emoji
  return '<span class="emoji-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + uiIconPath(name) + '</svg></span>'
}

function uiLineIcon(name, extraClass) {
  return '<span class="emoji-icon ' + (extraClass || '') + '" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + uiIconPath(name) + '</svg></span>'
}

function createUiIconNode(emoji) {
  var span = document.createElement('span')
  span.innerHTML = uiIconMarkup(emoji)
  return span.firstChild || document.createTextNode(emoji)
}

function iconizeTextNode(node) {
  var text = node.nodeValue
  UI_EMOJI_RE.lastIndex = 0
  if (!text || !UI_EMOJI_RE.test(text)) return
  UI_EMOJI_RE.lastIndex = 0
  var fragment = document.createDocumentFragment()
  var lastIndex = 0
  text.replace(UI_EMOJI_RE, function(match, group, offset) {
    if (offset > lastIndex) fragment.appendChild(document.createTextNode(text.slice(lastIndex, offset)))
    fragment.appendChild(createUiIconNode(match))
    lastIndex = offset + match.length
    return match
  })
  if (lastIndex < text.length) fragment.appendChild(document.createTextNode(text.slice(lastIndex)))
  node.parentNode.replaceChild(fragment, node)
}

function skipIconize(node) {
  if (!node || node.nodeType !== 1) return false
  return ['SCRIPT','STYLE','TEXTAREA','INPUT','SVG'].indexOf(node.tagName) >= 0 || (node.closest && node.closest('.emoji-icon'))
}

function iconizeEmoji(root) {
  root = root || document.body
  if (!root || skipIconize(root)) return
  var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode: function(node) { return skipIconize(node.parentElement) ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT }
  })
  var nodes = []
  while (walker.nextNode()) nodes.push(walker.currentNode)
  nodes.forEach(iconizeTextNode)
}

document.addEventListener('DOMContentLoaded', function() {
  iconizeEmoji()
  var observer = new MutationObserver(function(records) {
    records.forEach(function(record) {
      Array.prototype.forEach.call(record.addedNodes, function(node) {
        if (node.nodeType === 3) iconizeTextNode(node)
        else if (node.nodeType === 1) iconizeEmoji(node)
      })
    })
  })
  observer.observe(document.body, { childList: true, subtree: true })
})

// 後台金鑰改走 HTTP header：自動把 /admin/api/ 請求網址上的 ?key= 拿掉，改放 X-Admin-Key
// header，金鑰就不會出現在網址與伺服器日誌。包一層 fetch，呼叫端不必逐一修改。
;(function () {
  var _origFetch = window.fetch
  window.fetch = function (input, init) {
    try {
      if (typeof input === 'string' && input.indexOf('/admin/api/') !== -1) {
        var u = new URL(input, window.location.origin)
        var urlKey = u.searchParams.get('key')
        u.searchParams.delete('key')
        init = init || {}
        var h = init.headers || {}
        if (typeof Headers !== 'undefined' && h instanceof Headers) {
          var o = {}; h.forEach(function (v, k) { o[k] = v }); h = o
        }
        var theKey = (typeof KEY !== 'undefined' && KEY) ? KEY : urlKey
        if (theKey) h['X-Admin-Key'] = theKey
        init.headers = h
        input = u.pathname + (u.search || '') + (u.hash || '')
      }
    } catch (e) {}
    return _origFetch.call(this, input, init)
  }
})()

      method: 'POST',
      headers: { 'Content-Type': 'text/csv' },

    var msg = '✅ 匯入完成！新增 <b>' + data.created + '</b> 筆・更新 <b>' + data.updated + '</b> 筆'
    if (data.skipped) msg += '・略過 <b>' + data.skipped + '</b> 筆'
    if (data.errors && data.errors.length) {
      msg += '<br><span style="color:#c0392b;">⚠️ 錯誤：<br>' + data.errors.map(esc).join('<br>') + '</span>'
    }
    if (resultEl) { resultEl.style.background = data.errors.length ? '#fffbe6' : '#f0f8f0'; resultEl.innerHTML = msg }
    // 重新整理資料
    if (data.created || data.updated) setTimeout(function(){ location.reload() }, 1800)
  } catch(e) {
    if (resultEl) { resultEl.style.background = '#fff0f0'; resultEl.innerHTML = '❌ 連線錯誤：' + esc(e.message) }
  }
}

// ── 房源篩選（總篩選 / 房東區塊篩選）─────────────────────────────
var propertyViewTab = 'overview'
var propFilters = { location: '', type: '', rent: '', size: '', status: '', featured: '' }
var groupPropertyViewTabs = {}
var openPropertyGroups = {}
var groupPropFilters = {}

var PROPERTY_VIEW_TABS = [
  { id: 'overview', label: '總覽' },
  { id: 'available', label: '待出租' },
  { id: 'rented', label: '承租中' },
  { id: 'coming', label: '即將釋出' },
  { id: 'featured', label: '精選房源' },
  { id: 'offline', label: '已下架' },
]

function propLocationText(p) {
  return [p.city || '', p.district || ''].join('')
}

function propUrl(p) {
  var base = (DATA.siteUrl || '') + '/property/' + p.id
  var siteId = DATA.role === 'landlord' && DATA.landlordId ? DATA.landlordId : p.ownerId
  return base + (siteId ? '?site=' + siteId : '')
}

function priceBucket(price) {
  price = Number(price || 0)
  if (price <= 8000) return '0-8000'
  if (price <= 12000) return '8001-12000'
  if (price <= 18000) return '12001-18000'
  if (price <= 30000) return '18001-30000'
  return '30001-'
}

function sizeBucket(size) {
  size = Number(size || 0)
  if (size <= 5) return '0-5'
  if (size <= 8) return '5.1-8'
  if (size <= 12) return '8.1-12'
  return '12.1-'
}

function matchPropFilters(p, filters) {
  filters = filters || {}
  if (filters.location && propLocationText(p) !== filters.location) return false
  if (filters.type && p.type !== filters.type) return false
  if (filters.rent && priceBucket(p.price) !== filters.rent) return false
  if (filters.size && sizeBucket(p.size) !== filters.size) return false
  if (filters.status && p.status !== filters.status) return false
  if (filters.featured) {
    var feat = DATA.role !== 'super' ? p.siteFeatured : p.featured
    if (filters.featured === 'yes' && !feat) return false
    if (filters.featured === 'no' && feat) return false
  }
  return true
}

function matchPropertyViewTab(p, tab) {
  if (tab === 'available') return p.status === 'AVAILABLE'
  if (tab === 'rented') return p.status === 'RENTED'
  if (tab === 'coming') return p.status === 'COMING_SOON'
  if (tab === 'featured') return DATA.role !== 'super' ? !!p.siteFeatured : !!p.featured
  if (tab === 'offline') return ['INACTIVE', 'PAUSED', 'REJECTED'].indexOf(p.status) !== -1
  return true
}

function propertyTabList(list, tab) {
  return list.filter(function(p) { return matchPropertyViewTab(p, tab || propertyViewTab) })
}

function trafficSummary(list) {
  var totalToday = 0
  var total7d = 0
  var total30d = 0
  var totalAll = 0
  ;(list || []).forEach(function(p) {
    totalToday += Number(p.viewsToday || 0)
    total7d += Number(p.views7d || 0)
    total30d += Number(p.views30d || 0)
    totalAll += Number(p.viewCount || 0)
  })
  var avg7d = list && list.length ? Math.round(total7d / list.length) : 0
  var top7d = (list || []).slice().sort(function(a,b){ return Number(b.views7d || 0) - Number(a.views7d || 0) }).slice(0, 3)
  return { totalToday: totalToday, total7d: total7d, total30d: total30d, totalAll: totalAll, avg7d: avg7d, top7d: top7d }
}

function trafficDashboardHtml(list) {
  var s = trafficSummary(list)
  var topList = (list || []).slice().sort(function(a,b){ return Number(b.views7d || 0) - Number(a.views7d || 0) }).slice(0, 10)

function uniqueOptions(list, getter) {
  var seen = {}
  return list.map(getter).filter(function(v) {
    if (!v || seen[v]) return false
    seen[v] = true
    return true
  }).sort()
}

async function applyBatchStatus() {
  var checked = Array.from(document.querySelectorAll('.prop-cb:checked'))
  if (!checked.length) { showToast('請先勾選房源'); return }
  var newStatus = document.getElementById('batchStatus').value
  var label = PROP_STATUS_LABEL[newStatus] || newStatus
  var availableFrom = null
  if (newStatus === 'COMING_SOON') {
    availableFrom = prompt('請輸入即將釋出日期（YYYY-MM-DD）')
    if (availableFrom === null) return
    availableFrom = availableFrom.trim()
    if (!/^\d{4}-\d{2}-\d{2}$/.test(availableFrom)) { showToast('❌ 日期格式請用 YYYY-MM-DD'); return }
  }
  if (!confirm('確定將 ' + checked.length + ' 間房源改為「' + label + '」？')) return
  var ids = checked.map(function(cb){ return cb.dataset.id })
  showToast('更新中…')
  try {
    var res = await fetch('/admin/api/properties/batch-status?key=' + encodeURIComponent(KEY), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids: ids, status: newStatus, availableFrom: availableFrom })
    })
    var data = await res.json().catch(function(){ return {} })
    if (!res.ok) { showToast('❌ ' + (data.error || '更新失敗')); return }
    showToast('✅ 已更新 ' + (data.updated || ids.length) + ' 間房源')
  } catch(e) { showToast('❌ 更新失敗，請稍後再試'); return }
  await reload()
}

async function applyBatchFeatured(featured) {
  var checked = Array.from(document.querySelectorAll('.prop-cb:checked'))
  if (!checked.length) { showToast('請先勾選房源'); return }
  if (!confirm('確定將 ' + checked.length + ' 間房源' + (featured ? '設為精選' : '取消精選') + '？')) return
  var ids = checked.map(function(cb){ return cb.dataset.id })
  showToast('更新中…')
  try {
    var res = await fetch('/admin/api/properties/batch-featured?key=' + encodeURIComponent(KEY), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ids: ids, featured: featured })
    })
    var data = await res.json().catch(function(){ return {} })
    if (!res.ok) { showToast('❌ ' + (data.error || '精選更新失敗')); return }
    showToast('✅ 已更新精選 ' + (data.updated || ids.length) + ' 間')
  } catch(e) { showToast('❌ 精選更新失敗，請稍後再試'); return }
  await reload()
}

function buildCityOptions(selectedCity) {
  return Object.keys(TW_DISTRICTS).map(function(c) {
    return '<option value="' + c + '"' + (c === selectedCity ? ' selected' : '') + '>' + c + '</option>'
  }).join('')
}

function buildDistrictOptions(city, selectedDistrict) {
  var districts = TW_DISTRICTS[city] || []
  return '<option value="">請選擇區域</option>' + districts.map(function(d) {
    return '<option value="' + d + '"' + (d === selectedDistrict ? ' selected' : '') + '>' + d + '</option>'
  }).join('')
}

async function openAddPropertyModal() {
  try {
    var r = await fetch('/admin/api/community?key=' + encodeURIComponent(KEY))
    if (r.ok) _communities = await r.json()
  } catch(e) {}

  var draft = null
  try { draft = JSON.parse(localStorage.getItem(PROP_DRAFT_KEY) || 'null') } catch(e){}
  var hasDraft = draft && (draft.title || draft.price)
  var draftNote = hasDraft ? '<span class="draft-indicator">📝 已還原草稿</span>' : ''

  var html = '<div id="propModal" class="modal-overlay">' +
    '<div class="modal-box">' +
    '<div class="modal-header"><h3>➕ 新增房源' + draftNote + '</h3>' +
    '<button class="modal-close" onclick="closeAddPropertyModal()">×</button></div>' +
    propertyFormHtml(null, true) +
    '<div style="display:flex;gap:8px;margin-top:16px;position:sticky;bottom:0;background:white;padding-top:12px;">' +
    '<button class="btn" style="flex:1;background:var(--deep-sage);" onclick="saveProperty()">新增房源</button>' +
    '<button class="action-btn" style="flex:0 0 auto;" onclick="closeAddPropertyModal()">取消</button>' +
    '</div></div></div>'

  var existing = document.getElementById('propModal')
  if (existing) existing.remove()
  document.body.insertAdjacentHTML('beforeend', html)
  setTimeout(function() {
    renderImgPreview()
    if (hasDraft) loadPropDraft(draft)
  }, 30)
}

function closeAddPropertyModal() {
  var m = document.getElementById('propModal')
  if (m) m.remove()
}

function onCityChange() {
  var city = (document.getElementById('f_city')||{}).value || '台中市'
  var distSel = document.getElementById('f_district')
  if (distSel) {
    distSel.innerHTML = buildDistrictOptionsJS(city, '')
  }
  savePropDraft()
}

function buildDistrictOptionsJS(city, selected) {
  var districts = TW_DISTRICTS[city] || []
  return '<option value="">請選擇區域</option>' + districts.map(function(d) {
    return '<option value="' + d + '"' + (d === selected ? ' selected' : '') + '>' + d + '</option>'
  }).join('')
}

function savePropDraft() {
  if (editingPropertyId) return
  try {
    var d = {
      title: (document.getElementById('f_title')||{}).value || '',
      type: (document.getElementById('f_type')||{}).value || '',
      price: (document.getElementById('f_price')||{}).value || '',
      city: (document.getElementById('f_city')||{}).value || '',
      district: (document.getElementById('f_district')||{}).value || '',
      size: (document.getElementById('f_size')||{}).value || '',
      deposit: (document.getElementById('f_deposit')||{}).value || '',
      address: (document.getElementById('f_address')||{}).value || '',
      description: (document.getElementById('f_desc')||{}).value || '',
      images: (document.getElementById('f_images')||{}).value || '',
    }
    if (document.getElementById('f_owner')) d.ownerId = document.getElementById('f_owner').value
    localStorage.setItem(PROP_DRAFT_KEY, JSON.stringify(d))
  } catch(e){}
}

function loadPropDraft(d) {
  if (!d) return
  var set = function(id, val) { var el = document.getElementById(id); if (el && val) el.value = val }
  set('f_title', d.title); set('f_type', d.type); set('f_price', d.price)
  set('f_size', d.size); set('f_deposit', d.deposit)
  set('f_address', d.address); set('f_desc', d.description)
  // 縣市先設，再重建區域選單後設區域
  if (d.city) {
    set('f_city', d.city)
    var distSel = document.getElementById('f_district')
    if (distSel) distSel.innerHTML = buildDistrictOptionsJS(d.city, d.district || '')
  }
  if (d.images) { set('f_images', d.images); renderImgPreview() }
  if (d.ownerId) set('f_owner', d.ownerId)
}

async function startEditProperty(id) {
  try {
    var r = await fetch('/admin/api/community?key=' + encodeURIComponent(KEY))
    if (r.ok) _communities = await r.json()
  } catch(e) {}

  editingPropertyId = id
  var p = DATA.properties.find(function(x){ return x.id === id })
  if (!p) return

// ── 照片拖移排序 ─────────────────────────────────────────────────
var _dragIdx = null

function renderImgPreview() {
  var box = document.getElementById('img_preview')
  var hidden = document.getElementById('f_images')
  if (!box || !hidden) return
  var urls = hidden.value.split(',').map(function(s){ return s.trim() }).filter(Boolean)
  box.innerHTML = urls.map(function(u, i) {
    return '<div draggable="true" data-idx="' + i + '" ondragstart="imgDragStart(event,' + i + ')" ondragover="imgDragOver(event,' + i + ')" ondrop="imgDropOn(event,' + i + ')" ondragend="renderImgPreview()" ' +
      'style="position:relative;cursor:grab;user-select:none;">' +
      '<img src="' + u + '" style="width:80px;height:60px;object-fit:cover;border-radius:8px;display:block;border:2px solid ' + (i===0?'var(--sage)':'transparent') + ';">' +
      '<button onclick="removeImg(' + i + ')" title="刪除" style="position:absolute;top:-6px;right:-6px;background:var(--danger);color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;line-height:1;z-index:1;">×</button>' +
      '<button onclick="setCover(' + i + ')" title="設為封面" style="position:absolute;top:-6px;left:-6px;background:' + (i===0?'var(--sage)':'#aaa') + ';color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;line-height:1;z-index:1;">★</button>' +
      (i === 0 ? '<span style="position:absolute;bottom:2px;left:2px;background:var(--sage-dark,#4E7153);color:white;font-size:9px;padding:1px 4px;border-radius:3px;">封面</span>' : '') +
      '</div>'
  }).join('')
}

function imgDragStart(e, idx) { _dragIdx = idx; e.dataTransfer.effectAllowed = 'move' }

function imgDragOver(e, idx) {
  e.preventDefault()
  if (_dragIdx === null || _dragIdx === idx) return
  var hidden = document.getElementById('f_images')
  var urls = hidden.value.split(',').map(function(s){ return s.trim() }).filter(Boolean)
  var moved = urls.splice(_dragIdx, 1)[0]
  urls.splice(idx, 0, moved)
  hidden.value = urls.join(', ')
  _dragIdx = idx
  renderImgPreview()
}

function imgDropOn(e, idx) { e.preventDefault() }

function onImgDrop(e) { e.preventDefault() }

function setCover(idx) {
  var hidden = document.getElementById('f_images')
  var urls = hidden.value.split(',').map(function(s){ return s.trim() }).filter(Boolean)
  if (idx === 0 || !urls[idx]) return
  var cover = urls.splice(idx, 1)[0]
  urls.unshift(cover)
  hidden.value = urls.join(', ')
  renderImgPreview()
}

function removeImg(idx) {
  var hidden = document.getElementById('f_images')
  var urls = hidden.value.split(',').map(function(s){ return s.trim() }).filter(Boolean)
  urls.splice(idx, 1)
  hidden.value = urls.join(', ')
  renderImgPreview()
}

async function uploadImages(input) {
  var files = input.files
  if (!files.length) return
  var status = document.getElementById('upload_status')
  var hidden = document.getElementById('f_images')

  for (var i = 0; i < files.length; i++) {
    status.textContent = '上傳中... (' + (i + 1) + '/' + files.length + ')'
    var fd = new FormData()
    fd.append('file', files[i])
    try {
      var res = await fetch('/admin/api/upload?key=' + encodeURIComponent(KEY), { method: 'POST', body: fd })
      if (!res.ok) { status.textContent = '❌ 上傳失敗'; continue }
      var data = await res.json()
      var cur = hidden.value.split(',').map(function(s){ return s.trim() }).filter(Boolean)
      cur.push(data.url)
      hidden.value = cur.join(', ')
      renderImgPreview()
    } catch (e) {
      status.textContent = '❌ 上傳失敗'
    }
  }
  status.textContent = '✅ 上傳完成'
  input.value = ''
}

async function saveProperty() {
  var saveBtn = document.querySelector('#propModal .btn[onclick="saveProperty()"]')
  var origText = saveBtn ? saveBtn.textContent : ''
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '儲存中…' }

  var elecTypeEl = document.getElementById('f_elec_type')
  var elecType = elecTypeEl ? elecTypeEl.value : 'meter'
  var tags = Array.from(document.querySelectorAll('input[name="f_tags"]:checked')).map(function(cb){ return cb.value })
  var amenities = Array.from(document.querySelectorAll('input[name="f_amenities"]:checked')).map(function(cb){ return cb.value })

  var mgmtEl = document.getElementById('f_mgmt')
  var cleanEl = document.getElementById('f_cleaning')

  var body = {
    title:       document.getElementById('f_title').value.trim(),
    type:        document.getElementById('f_type').value,
    price:       document.getElementById('f_price').value,
    city:        document.getElementById('f_city').value.trim(),
    district:    document.getElementById('f_district').value.trim(),
    size:        document.getElementById('f_size').value,
    deposit:     document.getElementById('f_deposit').value.trim(),
    address:     document.getElementById('f_address').value.trim(),
    description: document.getElementById('f_desc').value.trim(),
    imageUrls:   document.getElementById('f_images').value.split(',').map(function(s){ return s.trim() }).filter(Boolean),
    mgmtFee:     mgmtEl ? (parseInt(mgmtEl.value) || 0) : 0,
    cleaningFee: cleanEl ? (parseInt(cleanEl.value) || 0) : 0,
    electricType: elecType || null,
    electricRate: null,
    electricFlat: null,
    tags: tags,
    amenities: amenities,
    communityId: (document.getElementById('f_community') || {}).value || null,
  }
  if (!body.title || !body.price) { showToast('❌ 名稱和租金必填'); return }

  var ownerSel = document.getElementById('f_owner')
  if (ownerSel) {
    if (!ownerSel.value) { showToast('❌ 請選擇房東'); return }
    body.ownerId = ownerSel.value
  }

  var url = editingPropertyId
    ? '/admin/api/property/' + editingPropertyId + '?key=' + encodeURIComponent(KEY)
    : '/admin/api/property?key=' + encodeURIComponent(KEY)

  try {
    var res = await fetch(url, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    })
    if (!res.ok) {
      var err = await res.json().catch(function(){ return {} })
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = origText }
      showToast('❌ 儲存失敗：' + (err.error || res.status)); return
    }
  } catch(e) {
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = origText }
    showToast('❌ 連線失敗：' + e.message); return
  }
  showToast(editingPropertyId ? '✅ 已更新房源' : '✅ 已新增房源')
  if (!editingPropertyId) { try { localStorage.removeItem(PROP_DRAFT_KEY) } catch(e){} }
  editingPropertyId = null
  closeAddPropertyModal()
  reload()
}

async function changePropertyStatus(id, status, selectEl) {
  var p = (DATA.properties || []).find(function(x){ return x.id === id })
  var previousStatus = p ? p.status : (selectEl ? selectEl.getAttribute('data-current') : '')
  var body = { status: status }
  if (status === 'COMING_SOON') {
    var date = prompt('請輸入即將釋出日期（YYYY-MM-DD）')
    if (date === null) {
      if (selectEl && previousStatus) selectEl.value = previousStatus
      return
    }
    date = date.trim()
    if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) {
      if (selectEl && previousStatus) selectEl.value = previousStatus
      showToast('❌ 日期格式請用 YYYY-MM-DD'); return
    }
    body.availableFrom = date
  } else {
    body.availableFrom = null
  }
  if (selectEl) selectEl.disabled = true
  var res = await fetch('/admin/api/property/' + id + '?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  })
  if (selectEl) selectEl.disabled = false
  if (!res.ok) {
    if (selectEl && previousStatus) selectEl.value = previousStatus
    var err = await res.json().catch(function(){ return {} })
    showToast('❌ 狀態更新失敗：' + (err.error || res.status))
    return
  }
  if (p) {
    p.status = status
    p.availableFrom = body.availableFrom
    p.updatedAt = new Date().toISOString()
  }
  showToast('✅ 狀態已更新')
  updatePropertyRowInPlace(id)
}

async function changeAvailableFrom(id, date) {
  if (!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)) { showToast('❌ 日期格式請用 YYYY-MM-DD'); return }
  var res = await fetch('/admin/api/property/' + id + '?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ status: 'COMING_SOON', availableFrom: date })
  })
  if (!res.ok) { showToast('❌ 日期更新失敗'); return }
  var p = (DATA.properties || []).find(function(x){ return x.id === id })
  if (p) {
    p.status = 'COMING_SOON'
    p.availableFrom = date
    p.updatedAt = new Date().toISOString()
  }
  showToast('✅ 即將釋出日期已更新')
  updatePropertyRowInPlace(id)
}

async function deleteProperty(id) {
  var p = (DATA.properties || []).find(function(x){ return x.id === id }) || {}
  if (!confirm('確定要刪除「' + (p.title || '這個房源') + '」嗎？\n\n刪除後會從前台下架並清除照片，這個動作無法直接從後台復原。')) return
  var res = await fetch('/admin/api/property/' + id + '/delete?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}'
  })
  if (!res.ok) { showToast('❌ 刪除失敗'); return }
  showToast('🗑️ 已刪除')
  closeAddPropertyModal()
  editingPropertyId = null
  reload()
}

async function toggleFeatured(id, currentFeatured, btn) {
  var newVal = !currentFeatured
  if (btn) btn.disabled = true
  var res = await fetch('/admin/api/property/' + id + '/featured?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ featured: newVal })
  })
  if (res.ok) {
    var updated = await res.json()
    // 只更新本地資料中的這一筆，不重抓全部後台資料
    var p = (DATA.properties || []).find(function(x){ return x.id === id })
    if (p) {
      if ('featured' in updated) p.featured = updated.featured
      if ('siteFeatured' in updated) p.siteFeatured = updated.siteFeatured
    }
    showToast(newVal ? '⭐ 已設為精選' : '☆ 已取消精選')
    if (btn) {
      btn.disabled = false
      btn.textContent = '★'
      btn.setAttribute('onclick', "toggleFeatured('" + id + "', " + (newVal ? 'true' : 'false') + ', this)')
      btn.classList.toggle('active', newVal)
    }
  } else {
    if (btn) btn.disabled = false
    showToast('❌ 操作失敗')
  }
}

    '<div class="modal-field"><label>通知 LINE User ID</label><input id="' + formId + '_notify" value="' + esc(l.notifyLineUserId || '') + '" placeholder="可留空"></div>' +

    '</div>' +
    '<div class="modal-toggle-row" style="margin-top:14px;">' +
    '<div><strong>Bot 狀態</strong><div style="font-size:12px;color:var(--muted);margin-top:3px;">關閉後房東 Bot 會暫停回覆服務</div></div>' +
    '<label style="display:flex;align-items:center;gap:8px;font-weight:800;cursor:pointer;"><input id="' + formId + '_enabled" type="checkbox"' + (l.botEnabled !== false ? ' checked' : '') + ' style="width:18px;height:18px;accent-color:var(--sage);"> 啟用</label>' +
    '</div>' +
    '<div class="modal-note">Bot 文字內容已整合在這個入口。需要調整歡迎語、按鈕文字或停用訊息，請點下方「編輯 Bot 文字」。</div>'
  var foot =
    '<button class="action-btn" onclick="closeAdminModal(\'' + modalId + '\');openBotTextEditor(\'' + id + '\')">編輯 Bot 文字</button>' +
    '<button class="action-btn" onclick="closeAdminModal(\'' + modalId + '\')">取消</button>' +
    '<button class="action-btn admin-primary" onclick="saveBotSettingsModal(\'' + id + '\', \'' + formId + '\', \'' + webhookUrl + '\', ' + (l.botEnabled !== false) + ', ' + (!!l.botConfigured) + ')">儲存</button>'
  openAdminModal(modalId, 'Bot 設定', esc(l.name || name || ''), body, foot)
  setTimeout(function(){ var el = document.getElementById(formId + '_secret'); if (el) el.focus() }, 30)
}

async function saveBotSettingsModal(id, formId, webhookUrl, wasEnabled, botConfigured) {
  var secretEl = document.getElementById(formId + '_secret')
  var tokenEl = document.getElementById(formId + '_token')
  var nameEl = document.getElementById(formId + '_name')
  var notifyEl = document.getElementById(formId + '_notify')
  var enabledEl = document.getElementById(formId + '_enabled')
  var secret = secretEl ? secretEl.value.trim() : ''
  var token = tokenEl ? tokenEl.value.trim() : ''
  var botName = nameEl ? nameEl.value.trim() : ''
  var notifyId = notifyEl ? notifyEl.value.trim() : ''
  var enabled = enabledEl ? enabledEl.checked : true

  if ((secret || token) && (!secret || !token)) { showToast('❌ Secret 和 Token 需要一起填寫'); return }
  if (!botConfigured && (!secret || !token)) { showToast('❌ Channel Secret 和 Access Token 為必填'); return }

  var res = await fetch('/admin/api/landlord/' + id + '/bot?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ lineChannelSecret: secret, lineChannelToken: token, lineBotName: botName, notifyLineUserId: notifyId })
  })
  if (!res.ok) { showToast('❌ 設定失敗'); return }

  if (enabled !== wasEnabled) {
    var toggleRes = await fetch('/admin/api/landlord/' + id + '/bot-toggle?key=' + encodeURIComponent(KEY), {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ enabled: enabled })
    })
    if (!toggleRes.ok) { showToast('❌ Bot 狀態更新失敗'); return }
  }

  // 顯示要填到 LINE 後台的 Webhook URL
  if (secret && token) alert('✅ Bot 設定完成！\\n\\n最後一步：到這個房東的 LINE Developers Console → Messaging API → Webhook URL，填入：\\n\\n' + webhookUrl + '\\n\\n並開啟「Use webhook」。\\n\\n（這串網址已幫你準備好，也會顯示在房東卡片上）')
  closeAdminModal('landlordBotModal')
  reload()
}

async function createLandlord() {
  var name = document.getElementById('l_name').value.trim()
  var email = document.getElementById('l_email').value.trim()
  var phone = document.getElementById('l_phone').value.trim()

  // inline error helper
  function showModalError(msg) {
    var errEl = document.getElementById('landlordModalError')
    if (errEl) { errEl.textContent = msg; errEl.style.display = 'block' }
  }

  if (!name || !email) { showModalError('房東名稱和 Email 為必填'); return }

  var btn = document.getElementById('createLandlordBtn')
  if (btn) { btn.disabled = true; btn.textContent = '新增中…' }

  var res = await fetch('/admin/api/landlord?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name: name, email: email, phone: phone })
  })
  if (!res.ok) {
    var err = await res.json()
    showModalError(err.error === 'email 已存在' ? '此 Email 已有房東帳號' : '新增失敗，請稍後再試')
    if (btn) { btn.disabled = false; btn.textContent = '新增房東' }

  var data = await res.json()
  closeAddLandlordModal()

    '<div style="font-size:32px;margin-bottom:8px;">✅</div>' +
    '<div style="font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:6px;">房東「' + esc(data.name) + '」已建立！</div>' +
    '<div style="font-size:13px;color:#6B7280;margin-bottom:16px;">請將以下登入金鑰交給房東，用於登入管理後台（僅此一次顯示）</div>' +
    '<div onclick="navigator.clipboard&&navigator.clipboard.writeText(\'' + esc(data._adminKey) + '\').then(function(){showToast(\'已複製！\')})" style="background:#F5F0EA;border-radius:10px;padding:14px;font-family:monospace;font-size:15px;font-weight:700;letter-spacing:1px;color:var(--deep-sage,#4A6741);cursor:pointer;user-select:all;word-break:break-all;" title="點擊複製">' + esc(data._adminKey) + '</div>' +

    '<button onclick="document.getElementById(\'adminKeyToast\').remove()" style="margin-top:20px;background:var(--deep-sage,#4A6741);color:#fff;border:none;border-radius:10px;padding:10px 32px;font-size:14px;font-weight:700;cursor:pointer;">確認關閉</button>' +

  document.body.insertAdjacentHTML('beforeend', keyHtml)
  reload()
}

function openMenuEditor(landlordId) {
  var l = (DATA.landlords || []).find(function(x){ return x.id === landlordId })
  menuEditState.landlordId = landlordId

  // 載入既有設定，或用預設
  if (l && l.richMenuConfig) {
    try {
      var cfg = JSON.parse(l.richMenuConfig)
      menuEditState.template = cfg.template || '4'
      menuEditState.cells = cfg.cells || []
      menuEditState.chatBarText = cfg.chatBarText || '選單'
    } catch (e) { resetMenuCells() }
  } else {
    resetMenuCells()
  }
  renderMenuEditor()
}

function resetMenuCells() {
  menuEditState.template = '4'
  menuEditState.chatBarText = '選單'
  menuEditState.cells = []
  for (var i = 0; i < 4; i++) {
    menuEditState.cells.push({ icon: DEFAULT_ICONS[i], label: DEFAULT_LABELS[i], text: DEFAULT_TEXTS[i], type: DEFAULT_TYPES[i] || 'message', uri: '' })
  }
}

function changeTemplate(t) {
  menuEditState.template = t
  var count = MENU_TEMPLATES[t].count
  var cells = []
  for (var i = 0; i < count; i++) {
    cells.push(menuEditState.cells[i] || { icon: DEFAULT_ICONS[i] || '', label: DEFAULT_LABELS[i] || '按鈕', text: DEFAULT_TEXTS[i] || '', type: DEFAULT_TYPES[i] || 'message', uri: '' })
  }
  menuEditState.cells = cells
  renderMenuEditor()
}

function updateCell(i, field, val) {
  menuEditState.cells[i][field] = val
}

function updateCellType(i, type) {
  menuEditState.cells[i].type = type
  renderMenuEditor()  // 重新渲染讓輸入欄位切換
}

function openFeaturesEditor(landlordId) {
  var l = (DATA.landlords || []).find(function(x){ return x.id === landlordId })
  var current = {}
  try { current = l && l.features ? JSON.parse(l.features) : {} } catch {}
  FEATURE_MODULES.forEach(function(m) { if (current[m.key] === undefined) current[m.key] = true })

  var rows = FEATURE_MODULES.map(function(m) {
    var checked = current[m.key] !== false
    return '<label style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--oat-mid);cursor:pointer;">' +
      '<input type="checkbox" id="feat_' + m.key + '" ' + (checked ? 'checked' : '') + ' style="margin-top:3px;width:18px;height:18px;accent-color:var(--sage);flex-shrink:0;">' +
      '<div><div style="font-size:14px;font-weight:700;color:var(--charcoal);">' + esc(m.label) + '</div>' +
      '<div style="font-size:12px;color:var(--gray-mid);margin-top:2px;">' + esc(m.desc) + '</div>' +
      '</div></label>'
  }).join('')

  var html = '<div id="featModal" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;">' +
    '<div style="background:white;border-radius:18px;padding:24px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto;">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">' +
    '<h3 style="margin:0;">⚙️ 功能模組</h3>' +
    '<button onclick="document.getElementById(\'featModal\').remove()" style="border:none;background:none;font-size:22px;cursor:pointer;">×</button></div>' +
    '<p style="font-size:13px;color:var(--gray-mid);margin-bottom:16px;">勾選要開放給此房東的功能。取消後，對應的後台頁籤與功能將會隱藏。</p>' +
    rows +
    '<div style="display:flex;gap:8px;margin-top:20px;">' +
    '<button onclick="document.getElementById(\'featModal\').remove()" style="flex:1;padding:12px;border-radius:10px;border:1.5px solid #E5E0D5;background:white;cursor:pointer;font-size:14px;">取消</button>' +
    '<button class="btn" style="flex:2;" onclick="saveFeaturesEditor(\'' + landlordId + '\')">✅ 儲存</button>' +
    '</div></div></div>'

  var existing = document.getElementById('featModal')
  if (existing) existing.remove()
  document.body.insertAdjacentHTML('beforeend', html)
}

async function saveFeaturesEditor(landlordId) {
  var features = {}
  FEATURE_MODULES.forEach(function(m) {
    var el = document.getElementById('feat_' + m.key)
    if (el) features[m.key] = el.checked
  })
  try {
    var res = await fetch('/admin/api/landlord/' + landlordId + '/features?key=' + encodeURIComponent(KEY), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ features: features }),
    })
    var data = await res.json()
    if (!res.ok) { showToast('❌ 儲存失敗：' + (data.error || '')); return }
    var l = (DATA.landlords || []).find(function(x){ return x.id === landlordId })
    if (l) l.features = JSON.stringify(features)
    document.getElementById('featModal').remove()
    showToast('✅ 功能模組已更新')
  } catch(e) { showToast('❌ 連線失敗') }
}

async function previewMenu() {
  var box = document.getElementById('menuPreview')
  box.innerHTML = '預覽生成中...'
  try {
    var res = await fetch('/admin/api/landlord/' + menuEditState.landlordId + '/richmenu/preview?key=' + encodeURIComponent(KEY), {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ template: menuEditState.template, cells: menuEditState.cells })
    })
    if (!res.ok) { box.innerHTML = '❌ 預覽失敗'; return }
    var blob = await res.blob()
    var url = URL.createObjectURL(blob)
    box.innerHTML = '<img src="' + url + '" style="width:100%;border-radius:10px;border:1px solid #E5E0D5;">'
  } catch (e) {
    box.innerHTML = '❌ 預覽失敗'
  }
}

async function applyMenu() {
  // 先存設定
  var saveRes = await fetch('/admin/api/landlord/' + menuEditState.landlordId + '/richmenu?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ template: menuEditState.template, cells: menuEditState.cells, chatBarText: menuEditState.chatBarText })
  })
  if (!saveRes.ok) { showToast('❌ 儲存失敗'); return }

  showToast('套用中，請稍候...')
  var res = await fetch('/admin/api/landlord/' + menuEditState.landlordId + '/richmenu/apply?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}'
  })
  if (!res.ok) {
    var err = await res.json()
    alert('❌ 套用失敗：' + (err.error || '未知錯誤') + '\\n\\n請確認該房東的 Bot 已設定 Channel Token。')
    return
  }
  showToast('✅ 選單已套用')
  closeMenuEditor()
  reload()
}

async function uploadLogo(input) {
  if (!input.files || !input.files[0]) return
  var status = document.getElementById('logo_status')
  status.textContent = '上傳中...'
  var fd = new FormData()
  fd.append('file', input.files[0])
  try {
    var res = await fetch('/admin/api/upload?key=' + encodeURIComponent(KEY), { method: 'POST', body: fd })
    if (!res.ok) { status.textContent = '❌ 上傳失敗'; return }
    var data = await res.json()
    siteEditState.siteLogo = data.url
    document.getElementById('logo_preview').innerHTML = '<img src="' + data.url + '" style="width:72px;height:72px;object-fit:cover;border-radius:12px;border:1px solid #E5E0D5;">'
    status.textContent = '✅ 上傳完成'
  } catch (e) {
    status.textContent = '❌ 上傳失敗'
  }
}

async function saveSite() {

  showToast('✅ 官網設定已儲存')

  reload()
}

function buildBotFormContent(values) {
  var togglesSection = '<details class="acc" open><summary>📱 主選單按鈕顯示</summary><div class="acc-body">' +
    SHOW_TOGGLES.map(function(s) {
      var checked = values[s.key] !== false
      return '<label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;">' +
        '<input type="checkbox" id="bt_' + s.key + '"' + (checked ? ' checked' : '') + ' style="width:16px;height:16px;cursor:pointer;accent-color:var(--sage);">' +
        '<span style="font-size:14px;">' + s.label + '</span></label>'
    }).join('') + '</div></details>'

  var groupSections = BOT_TEXT_GROUPS.map(function(g) {
    var fieldsHtml = g.fields.map(function(f) {
      var val = values[f.key] || ''
      var input = f.multi
        ? '<textarea id="bt_' + f.key + '" rows="2" placeholder="' + esc(f.ph) + '" style="width:100%;padding:8px;border:1px solid #E5E0D5;border-radius:8px;font-size:13px;font-family:inherit;">' + esc(val) + '</textarea>'
        : '<input id="bt_' + f.key + '" value="' + esc(val) + '" placeholder="' + esc(f.ph) + '" style="width:100%;padding:8px;border:1px solid #E5E0D5;border-radius:8px;font-size:13px;">'
      return '<div style="margin-bottom:12px;"><label style="font-size:12px;color:#888;display:block;margin-bottom:4px;">' + f.label + '</label>' + input + '</div>'
    }).join('')
    return '<details class="acc"' + (g.open ? ' open' : '') + '><summary>' + g.label + '</summary><div class="acc-body"><p style="font-size:12px;color:#aaa;margin:0 0 12px;">留空使用系統預設值</p>' + fieldsHtml + '</div></details>'
  }).join('')

  return togglesSection + groupSections
}

async function saveBotText() {
  var values = {}
  // 收集四個按鈕開關
  SHOW_TOGGLES.forEach(function(s) {
    var el = document.getElementById('bt_' + s.key)
    if (el) values[s.key] = el.checked
  })
  // 收集文字欄位（留空 = 使用預設）
  BOT_TEXT_GROUPS.forEach(function(g) {
    g.fields.forEach(function(f) {
      var el = document.getElementById('bt_' + f.key)
      if (el && el.value.trim()) values[f.key] = el.value.trim()
    })
  })
  var res = await fetch('/admin/api/landlord/' + botTextState.id + '/bottext?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ botTextConfig: JSON.stringify(values) })
  })
  if (!res.ok) { showToast('❌ 儲存失敗'); return }
  showToast('✅ Bot 文字已儲存')
  closeBotTextEditor()
  reload()
}

async function editLandlord(id) {
  var l = (DATA.landlords || []).find(function(x){ return x.id === id })
  if (!l) return
  var modalId = 'landlordEditModal'
  var formId = 'landlordEditForm'
  var body =
    '<div class="modal-form-grid">' +
    '<div class="modal-field"><label>房東名稱</label><input id="' + formId + '_name" value="' + esc(l.name || '') + '"></div>' +
    '<div class="modal-field"><label>Email（登入帳號）</label><input id="' + formId + '_email" type="email" value="' + esc(l.email || '') + '"></div>' +
    '<div class="modal-field full"><label>電話</label><input id="' + formId + '_phone" value="' + esc(l.phone || '') + '" placeholder="可留空"></div>' +
    '</div>'
  var foot =
    '<button class="action-btn" onclick="closeAdminModal(\'' + modalId + '\')">取消</button>' +
    '<button class="action-btn admin-primary" onclick="saveLandlordInline(\'' + id + '\', \'' + formId + '\')">儲存</button>'
  openAdminModal(modalId, '編輯房東資料', esc(l.name || ''), body, foot)
  setTimeout(function(){ var el = document.getElementById(formId + '_name'); if (el) el.focus() }, 30)
}

async function saveLandlordInline(id, formId) {
  var nameEl = document.getElementById(formId + '_name')
  var emailEl = document.getElementById(formId + '_email')
  var phoneEl = document.getElementById(formId + '_phone')
  var name = nameEl ? nameEl.value.trim() : ''
  var email = emailEl ? emailEl.value.trim() : ''
  var phone = phoneEl ? phoneEl.value.trim() : ''

  if (!name) { showToast('❌ 房東名稱不可空白'); return }
  if (!email) { showToast('❌ Email 不可空白'); return }

  var res = await fetch('/admin/api/landlord/' + id + '?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name: name, email: email, phone: phone })
  })
  var data = await res.json()
  if (!res.ok) { showToast('❌ ' + (data.error || '更新失敗')); return }
  showToast('✅ 房東資料已更新')
  closeAdminModal('landlordEditModal')
  reload()
}

async function toggleLandlord(id, isActive) {
  await fetch('/admin/api/landlord/' + id + '?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ isActive: isActive })
  })
  showToast(isActive ? '✅ 已啟用' : '⏸️ 已停用')
  reload()
}

async function deleteLandlord(id, name, propCount) {
  var msg = '⚠️ 完全刪除房東「' + name + '」\n\n' +
    '將永久刪除：\n' +
    '• 此房東帳號\n' +
    '• 名下 ' + propCount + ' 筆房源（含照片、預約、評論、維修等所有關聯）\n' +
    '• 相關代管／租約資料\n\n' +
    '⛔ 此動作無法復原！\n\n' +
    '確定要刪除請輸入「刪除」兩個字：'
  var ans = prompt(msg)
  if (ans === null) return
  if (ans.trim() !== '刪除') { showToast('已取消（未輸入「刪除」）'); return }
  showToast('刪除中…請稍候')
  try {
    var res = await fetch('/admin/api/landlord/' + id + '?key=' + encodeURIComponent(KEY), { method: 'DELETE' })
    var data = await res.json().catch(function(){ return {} })
    if (!res.ok) { showToast('❌ 刪除失敗：' + (data.error || ('HTTP ' + res.status))); return }
    showToast('✅ 已刪除房東「' + name + '」與 ' + (data.deletedProperties || 0) + ' 筆房源')
    reload()
  } catch (e) { showToast('❌ 連線失敗：' + e.message) }
}

async function updateBooking(id, status, rejectReason) {
  var res = await fetch('/admin/api/booking/' + id + '/status?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ status: status, rejectReason: rejectReason || undefined })
  })
  var data = await res.json()
  if (!res.ok) {
    showToast('❌ 更新失敗')
    return
  }
  var notifyStatuses = ['CONFIRMED', 'CANCELLED', 'REJECTED']
  if (notifyStatuses.indexOf(status) !== -1 && !data.notification.notified) {
    showToast('⚠️ 狀態已更新，但 LINE 通知失敗')
  } else if (data.notification.notified) {
    showToast('✅ 已更新並通知租客')
  } else {
    showToast('✅ 已更新')
  }
  reload()
}

// 退回預約：填寫理由後一併通知租客
function rejectBooking(id) {
  var reason = window.prompt('請輸入退回理由（會一併傳給租客）：\n例如「這個時段已額滿，歡迎改約其他時間」', '這個時段已額滿，歡迎改約其他時間')
  if (reason === null) return            // 按取消
  updateBooking(id, 'REJECTED', reason.trim())
}

async function updateRepair(id, status) {
  await fetch('/admin/api/repair/' + id + '/status?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ status: status })

async function editName(tenantId, currentName) {
  var newName = prompt('輸入備註名稱（清空 = 恢復顯示 LINE 名稱）:', currentName)
  if (newName === null) return
  await fetch('/admin/api/tenant/' + tenantId + '/name?key=' + encodeURIComponent(KEY), {

    body: JSON.stringify({ customName: newName.trim() })
  })

  reload()
}

function domSafeId(value) {
  return String(value || '').replace(/[^a-zA-Z0-9_-]/g, '_')
}

function jsArg(value) {
  return JSON.stringify(String(value == null ? '' : value)).replace(/</g, '\\u003c')
}

function tenantSourceName(t) {
  if (t.landlord && t.landlord.siteName) return t.landlord.siteName
  if (t.source && t.source !== 'main') return t.source
  if (t.landlord && t.landlord.name) return t.landlord.name
  return '\u5c0f\u8778\u4e3b\u7ad9'
}

function startTenantNameEdit(tenantId) {
  var box = document.getElementById('tenantEdit_' + domSafeId(tenantId))
  var input = document.getElementById('tenantEditInput_' + domSafeId(tenantId))
  var note = document.getElementById('tenantNote_' + domSafeId(tenantId))
  if (!box || !input) return
  box.classList.add('open')
  if (note) note.style.display = 'none'
  input.focus()
  input.select()
}

function cancelTenantNameEdit(tenantId) {
  var box = document.getElementById('tenantEdit_' + domSafeId(tenantId))
  var note = document.getElementById('tenantNote_' + domSafeId(tenantId))
  if (box) box.classList.remove('open')
  if (note) note.style.display = ''
}

function toggleTenantCard(event, safeId) {
  if (event && event.target && event.target.closest('button,input,a,.uid')) return
  var card = document.getElementById('tenantCard_' + safeId)
  if (card) card.classList.toggle('open')
}

async function editName(tenantId) {
  startTenantNameEdit(tenantId)
}

async function saveTenantName(tenantId) {
  var input = document.getElementById('tenantEditInput_' + domSafeId(tenantId))
  if (!input) return
  var newName = input.value.trim()
  var res = await fetch('/admin/api/tenant/' + tenantId + '/name?key=' + encodeURIComponent(KEY), {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ customName: newName })
  })
  if (!res.ok) {
    showToast('備註名稱更新失敗')
    return
  }
  DATA.tenants = DATA.tenants.map(function(t) {
    if (t.id === tenantId) t.customName = newName
    return t
  })
  showToast('備註名稱已更新')
  renderTab()
}

function renderWebUsersContent() {

  if (!webUsersCache.length) return '<div class="empty">目前沒有網站註冊用戶</div>'
  return webUsersCache.map(renderWebUserCard).join('')
}

async function loadWebUsers() {
  var list = document.getElementById('webUsersList')
  if (webUsersCache !== null) {
    if (list) list.innerHTML = renderWebUsersContent()
    return
  }
  if (list) list.innerHTML = '<div class="empty">網站註冊用戶載入中...</div>'
  try {
    var res = await fetch('/admin/api/webusers?key=' + encodeURIComponent(KEY))
    var users = await res.json()
    if (!res.ok) throw new Error(users.error || 'load failed')
    webUsersCache = users
    var target = document.getElementById('webUsersList')
    if (target) target.innerHTML = renderWebUsersContent()
  } catch (e) {
    var errorTarget = document.getElementById('webUsersList')
    if (errorTarget) errorTarget.innerHTML = '<div class="empty">網站註冊用戶載入失敗：' + esc(e.message) + '</div>'
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text)
  showToast('📋 已複製 User ID')
}

function fmtDate(d) {
  if (!d) return '-'
  return new Date(d).toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' })
}

function dateInputValue(d) {
  if (!d) return ''
  var date = new Date(d)
  if (isNaN(date.getTime())) return ''
  return date.toISOString().slice(0, 10)
}

function dateInputValue(d) {
  if (!d) return ''
  var date = new Date(d)
  if (isNaN(date.getTime())) return ''
  return date.toISOString().slice(0, 10)
}

function showToast(msg) {
  var t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  setTimeout(function(){ t.classList.remove('show') }, 2000)
}

async function renderHeroSettings() {
  // Landlord role → show their own site branding, NOT the main xiaowo site settings
  if (DATA.role === 'landlord') {
    renderLandlordBrandSettings()
    return
  }
  // Super admin → show main site hero + logo settings (original behaviour)
  var el = document.getElementById('content')
  el.innerHTML = '<div class="form-box"><p style="color:#888;font-size:14px;">載入中...</p></div>'
  try {
    var siteBase = (DATA.siteUrl || '').replace(/\/$/, '')
    var res = await fetch(siteBase + '/api/admin/hero')
    if (res.ok) {
      var data = await res.json()
      heroSlides = data.slides || []
      heroLogoUrl = data.logoUrl || ''
    } else { heroSlides = []; heroLogoUrl = '' }
  } catch(e) { heroSlides = []; heroLogoUrl = '' }
  drawHeroSettings()
}

function renderBrandSlideGrid() {
  if (!landlordBrandState.siteSlides.length) return '<p style="font-size:13px;color:#aaa;padding:8px 0;">尚無輪播圖</p>'
  return landlordBrandState.siteSlides.map(function(s, i) {
    return '<div style="position:relative;width:120px;height:80px;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);">' +
      '<img src="' + esc(s.url) + '" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.style.background=\'#E5E0D5\'">' +
      '<button onclick="removeBrandSlide(' + i + ')" style="position:absolute;top:4px;right:4px;background:rgba(220,70,70,0.85);border:none;color:white;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:14px;line-height:1;">✕</button>' +
      '<div style="position:absolute;top:4px;left:6px;background:rgba(0,0,0,0.45);color:white;font-size:10px;border-radius:4px;padding:1px 5px;">' + (i+1) + '</div>' +
      '</div>'
  }).join('')
}

function removeBrandSlide(i) {
  landlordBrandState.siteSlides.splice(i, 1)
  var g = document.getElementById('brandSlideGrid'); if (g) g.innerHTML = renderBrandSlideGrid()
}

function handleBrandSlideDrop(e) {
  e.preventDefault()
  var dz = document.getElementById('brandDropZone'); if (dz) dz.style.background = '#F8F6F1'
  if (e.dataTransfer.files && e.dataTransfer.files.length) uploadBrandSlides(e.dataTransfer.files)
}

async function uploadBrandSlides(files) {
  var resultEl = document.getElementById('brandSlideUploadResult')
  if (!files || !files.length) return
  var arr = Array.from(files), done = 0, failed = 0
  resultEl.textContent = '上傳中 0/' + arr.length + '…'
  for (var f of arr) {
    var fd = new FormData(); fd.append('file', f)
    try {
      var r = await fetch('/admin/api/upload?key=' + encodeURIComponent(KEY), { method: 'POST', body: fd })
      var d = await r.json()
      if (!r.ok || !d.url) { failed++; continue }
      landlordBrandState.siteSlides.push({ url: d.url })
      done++
      resultEl.textContent = '上傳中 ' + done + '/' + arr.length + '…'
      var g = document.getElementById('brandSlideGrid'); if (g) g.innerHTML = renderBrandSlideGrid()
    } catch(e) { failed++ }
  }
  resultEl.textContent = (done > 0 ? '✅ 已上傳 ' + done + ' 張' : '') + (failed ? (done > 0 ? '，' : '') + failed + ' 張失敗' : '')
  document.getElementById('brandSlideFile').value = ''
}

async function uploadBrandLogo() {
  var fileInput = document.getElementById('brandLogoFile')
  var statusEl  = document.getElementById('brandLogoStatus')
  if (!fileInput || !fileInput.files[0]) { if(statusEl) statusEl.textContent = '請先選擇圖片'; return }
  if (statusEl) statusEl.textContent = '上傳中…'
  var fd = new FormData(); fd.append('file', fileInput.files[0])
  var r = await fetch('/admin/api/upload?key=' + encodeURIComponent(KEY), { method: 'POST', body: fd })
  var data = await r.json()
  if (!data.url) throw new Error('上傳失敗')
  landlordBrandState.siteLogo = data.url
  // 更新預覽（橫式，無框框，與主站一致）
  var prev = document.getElementById('brandLogoPreview')
  if (prev) prev.innerHTML = '<div style="margin-top:4px;display:flex;align-items:center;gap:12px;"><img src="' + esc(data.url) + '" style="height:48px;object-fit:contain;background:#f5f5f3;border-radius:8px;padding:4px 8px;" /><button onclick="clearBrandLogo()" style="background:none;border:none;color:var(--warn);cursor:pointer;font-size:13px;">移除</button></div>'
  if (statusEl) statusEl.innerHTML = '✅ 上傳並儲存中…'
  // 立即儲存
  await saveLandlordBrand()
  if (statusEl) statusEl.innerHTML = '✅ 上傳成功！<br><small style="color:#aaa;">' + esc(data.url) + '</small>'
}

function clearBrandLogo() {
  landlordBrandState.siteLogo = ''
  var prev = document.getElementById('brandLogoPreview')
  if (prev) prev.innerHTML = ''
}

async function saveLandlordBrand() {
  if (!DATA.landlordId) { showToast('❌ 無法儲存：缺少房東 ID'); return }
  var res = await fetch('/admin/api/landlord/' + DATA.landlordId + '/site?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ siteLogo: landlordBrandState.siteLogo, siteSlides: landlordBrandState.siteSlides }),
  })
  if (!res.ok) {
    var errText = ''
    try { var d = await res.json(); errText = d.error || '' } catch(_) {}
    showToast('❌ 儲存失敗' + (errText ? '：' + errText : ' (HTTP ' + res.status + ')'))
    return
  }
  showToast('✅ 首頁設定已儲存')
  if (DATA.selfLandlord) {
    DATA.selfLandlord.siteLogo = landlordBrandState.siteLogo
    try {
      var feats = DATA.selfLandlord.features ? JSON.parse(DATA.selfLandlord.features) : {}
      feats.siteSlides = landlordBrandState.siteSlides
      DATA.selfLandlord.features = JSON.stringify(feats)
    } catch(_) {}
  }
}

// ── 輪播圖縮圖 grid（拖曳排序）──────────────────────────
var _dragIdx = null

function renderHeroSlideGrid() {
  if (!heroSlides.length) {
    return '<p style="font-size:13px;color:#aaa;padding:12px 0;">尚無輪播圖，請上傳。</p>'
  }
  return heroSlides.map(function(s, i) {
    return [
      '<div draggable="true"',
      ' ondragstart="heroSlideDragStart(event,' + i + ')"',
      ' ondragover="heroSlideDragOver(event,' + i + ')"',
      ' ondrop="heroSlideDrop(event,' + i + ')"',
      ' ondragend="heroSlideDragEnd()"',
      ' style="position:relative;width:120px;height:80px;border-radius:10px;overflow:hidden;cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,0.1);">',
      '<img src="' + esc(s.url) + '" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.style.background=\'#E5E0D5\'">',
      '<div style="position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.25);display:flex;align-items:flex-end;justify-content:flex-end;padding:4px;">',
      '<button onclick="removeHeroSlide(' + i + ')" style="background:rgba(220,70,70,0.85);border:none;color:white;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;">✕</button>',
      '</div>',
      '<div style="position:absolute;top:4px;left:6px;background:rgba(0,0,0,0.45);color:white;font-size:10px;border-radius:4px;padding:1px 5px;">' + (i+1) + '</div>',
      '</div>',
    ].join('')
  }).join('')
}

function heroSlideDragStart(e, i) {
  _dragIdx = i
  e.currentTarget.style.opacity = '0.4'
  e.dataTransfer.effectAllowed = 'move'
}
function heroSlideDragOver(e, i) {
  e.preventDefault()
  e.dataTransfer.dropEffect = 'move'
}
function heroSlideDrop(e, i) {
  e.preventDefault()
  if (_dragIdx === null || _dragIdx === i) return
  var moved = heroSlides.splice(_dragIdx, 1)[0]
  heroSlides.splice(i, 0, moved)
  _dragIdx = null
  document.getElementById('heroSlideGrid').innerHTML = renderHeroSlideGrid()
  saveHeroSlides()
}
function heroSlideDragEnd() {
  _dragIdx = null
  document.getElementById('heroSlideGrid').innerHTML = renderHeroSlideGrid()
}

async function removeHeroSlide(i) {
  heroSlides.splice(i, 1)
  document.getElementById('heroSlideGrid').innerHTML = renderHeroSlideGrid()
  await saveHeroSlides()
}

function handleHeroDrop(e) {
  e.preventDefault()
  document.getElementById('heroDropZone').style.background = '#F8F6F1'
  var files = e.dataTransfer.files
  if (files && files.length) uploadHeroImages(files)
}

async function uploadHeroImages(files) {
  var resultEl = document.getElementById('heroUploadResult')
  if (!files || !files.length) return
  var arr = Array.from(files)
  resultEl.textContent = '上傳中 0/' + arr.length + '…'
  var done = 0, failed = 0
  for (var f of arr) {
    var fd = new FormData()
    fd.append('file', f)
    try {
      var res = await fetch('/admin/api/upload?key=' + encodeURIComponent(KEY), { method: 'POST', body: fd })
      var data = await res.json()
      if (!res.ok || !data.url) { failed++; continue }
      heroSlides.push({ url: data.url, alt: '小蝸出租房源' })
      done++
      resultEl.textContent = '上傳中 ' + done + '/' + arr.length + '…'
      document.getElementById('heroSlideGrid').innerHTML = renderHeroSlideGrid()
    } catch(e) { failed++ }
  }
  var msg = '✅ 已上傳 ' + done + ' 張'
  if (failed) msg += '，' + failed + ' 張失敗'
  resultEl.textContent = msg
  document.getElementById('heroFileInput').value = ''
  if (done > 0) await saveHeroSlides()
}

async function uploadLogo() {
  var fileInput = document.getElementById('logoFileInput')
  var resultEl = document.getElementById('logoUploadResult')
  if (!fileInput.files[0]) { resultEl.textContent = '請先選擇圖片'; return }
  resultEl.textContent = '上傳中…'
  var fd = new FormData()
  fd.append('file', fileInput.files[0])
  try {
    var r = await fetch('/admin/api/upload?key=' + encodeURIComponent(KEY), { method: 'POST', body: fd })
    var data = await r.json()
    if (!data.url) throw new Error('上傳失敗')
    heroLogoUrl = data.url
    resultEl.innerHTML = '✅ 上傳成功，儲存中…'
    drawHeroSettings() // 只更新畫面，不重新 fetch（避免覆蓋剛上傳的值）
    await saveHeroSlides() // 立即儲存到資料庫
    resultEl.innerHTML = '✅ 上傳並儲存成功！<br><small>' + esc(data.url) + '</small>'
  } catch(e) {
    resultEl.textContent = '❌ ' + e.message
  }
}

async function clearLogo() {
  heroLogoUrl = ''
  drawHeroSettings()
  await saveHeroSlides() // 立即儲存到資料庫
}

async function saveHeroSlides(silent) {
  try {
    var siteBase = (DATA && DATA.siteUrl ? DATA.siteUrl : 'https://xiaowo-rental.vercel.app').replace(/\/$/, '')
    var slides = heroSlides.filter(function(s){ return s.url && s.url.trim() })
    var res = await fetch(siteBase + '/api/admin/hero', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + KEY },
      body: JSON.stringify({ slides: slides, logoUrl: heroLogoUrl })
    })
    var data = await res.json()
    if (!res.ok) { showToast('❌ 儲存失敗：' + (data.error || '')); return false }
    if (!silent) showToast('✅ 已儲存 ' + data.count + ' 張輪播圖')
    return true
  } catch(e) {
    showToast('❌ 連線失敗，請確認網站是否運行中')
    return false
  }
}

  return [

    '📍 ' + (p.city || '') + (p.district || ''),

}

  socialSelectedPropertyId = id
  var ta = document.getElementById('socialCaption')

  if (!socialCaptionEdited || ta.value.trim() === '') {

// 先以 header 取得一次性票券，OAuth 彈窗網址只帶 ticket，不帶後台金鑰
async function getOauthTicket() {
  try {
    var res = await fetch('/admin/api/social/oauth-ticket', { method: 'POST' })
    if (!res.ok) return ''
    var d = await res.json()
    return d.ticket || ''
  } catch (e) { return '' }
}

// 先同步開好空白彈窗（避免被擋），拿到票券後再導向授權頁
function openOauthPopup(path, name, platformLabel) {
  var w = window.open('about:blank', name, 'width=600,height=720')
  getOauthTicket().then(function(ticket) {
    if (!ticket) { if (w) w.close(); showToast('❌ 取得授權票券失敗，請重新登入後台'); return }
    if (w) w.location = path + '?ticket=' + encodeURIComponent(ticket)
  })
  var timer = setInterval(function() {
    if (w && w.closed) {
      clearInterval(timer)
      renderSocialTab()
      showToast('已更新 ' + platformLabel + ' 連結狀態')
    }
  }, 1000)
}

function connectInstagram() { openOauthPopup('/admin/api/social/ig/connect', 'ig_oauth', 'Instagram') }
function connectFacebook() { openOauthPopup('/admin/api/social/fb/connect', 'fb_oauth', 'Facebook') }
// 點已連結的帳號按鈕 → 詢問是否取消連結
async function disconnectSocial(platform, name) {
  var label = platform === 'instagram' ? 'Instagram' : 'Facebook 粉專'
  if (!confirm('要取消與「' + (name || label) + '」的連結嗎？\n取消後需重新連結才能再發文。')) return
  try {
    var res = await fetch('/admin/api/social/disconnect', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ platform: platform }),
    })
    if (!res.ok) { showToast('❌ 取消失敗'); return }
    showToast('已取消連結')
    renderSocialTab()
  } catch (e) { showToast('❌ 連線失敗：' + e.message) }
}

async function switchFbPage(pageId) {

// ── FB 社團小幫手：複製文案 / 下載照片（社團只能手動貼）──────────
function copySocialCaption() {
  var ta = document.getElementById('socialCaption')
  var text = ta ? ta.value : ''
  if (!text.trim()) { showToast('❌ 沒有文案可複製'); return }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      function(){ showToast('✅ 文案已複製，到社團貼上即可') },
      function(){ fallbackCopyText(ta) }
    )
  } else { fallbackCopyText(ta) }
}
function fallbackCopyText(ta) {
  try { ta.focus(); ta.select(); document.execCommand('copy'); showToast('✅ 文案已複製') }
  catch (e) { showToast('❌ 複製失敗，請手動長按選取') }
}

async function downloadSocialPhotos() {
  if (!socialSelectedPropertyId) { showToast('❌ 請先選擇房源'); return false }
  showToast('準備下載照片…')
  try {
    var res = await fetch('/admin/api/property/' + socialSelectedPropertyId + '?key=' + encodeURIComponent(KEY))
    var data = await res.json()
    var imgs = (data.images || []).map(function(x){ return x.url }).filter(Boolean)
    if (!imgs.length) { showToast('❌ 此房源沒有照片'); return false }
    var base = (data.title || 'photo').replace(/[\\/:*?"<>|]/g, '').slice(0, 20)
    for (var i = 0; i < imgs.length; i++) {
      await downloadOneImage(imgs[i], base + '_' + (i + 1))
      await new Promise(function(r){ setTimeout(r, 400) })
    }
    showToast('✅ 已下載 ' + imgs.length + ' 張照片（在瀏覽器下載資料夾）')
    return true
  } catch (e) { showToast('❌ 下載失敗：' + e.message); return false }
}
async function downloadOneImage(url, name) {
  try {
    var resp = await fetch(url, { mode: 'cors' })
    var blob = await resp.blob()
    var ext = (blob.type && blob.type.indexOf('/') > -1) ? blob.type.split('/')[1] : 'jpg'
    var objUrl = URL.createObjectURL(blob)
    var a = document.createElement('a')
    a.href = objUrl; a.download = name + '.' + ext
    document.body.appendChild(a); a.click(); document.body.removeChild(a)
    setTimeout(function(){ URL.revokeObjectURL(objUrl) }, 2000)
  } catch (e) {
    window.open(url, '_blank')  // CORS 擋下時退而用新分頁開啟，可手動另存
  }
}

// ── IG 版面規劃（總覽已發布 ＋ 規劃未發布）────────────────────────
var igPlan = []          // 規劃中房源 id 陣列（index 0 ＝ 九宮格左上＝最新）
var igFeed = []          // IG 已發布貼文
var igDragFrom = -1
var igShowRentedOnly = false  // 已發布區是否只顯示「已出租」對應的貼文

function igPropThumb(p) {
  return (p && p.images && p.images[0] && p.images[0].url) || ''
}

// 用文案是否包含房源標題，比對已發布貼文對應到哪個房源（找出已出租的）
function igMatchProperty(caption) {
  if (!caption) return null
  var props = DATA.properties || []
  for (var i = 0; i < props.length; i++) {
    var t = props[i].title
    if (t && t.length > 1 && caption.indexOf(t) !== -1) return props[i]
  }
  return null
}

async function renderIgPlanner() {
  var box = document.getElementById('igPlanner')
  if (!box) return
  var ig = socialConfig.instagram || {}
  if (!ig.accountId) {
    box.innerHTML = '<p style="color:var(--gray-light);font-size:13px;">請先在上方「連結 Instagram」後，才能規劃並連動版面。</p>'
    return
  }
  box.innerHTML = '<p style="color:#888;font-size:13px;">載入 IG 貼文中…</p>'
  try {
    var r = await Promise.all([
      fetch('/admin/api/social/ig/plan?key=' + encodeURIComponent(KEY)).then(function(x){ return x.json() }),
      fetch('/admin/api/social/ig/feed?key=' + encodeURIComponent(KEY)).then(function(x){ return x.json() }),
    ])
    var planData = r[0], feedData = r[1]
    var props = DATA.properties || []
    igPlan = (planData.plan || []).filter(function(id){ return props.some(function(p){ return p.id === id }) })
    if (feedData.error) { box.innerHTML = '<p style="color:#c0392b;font-size:13px;">讀取 IG 貼文失敗：' + esc(feedData.error) + '</p>'; return }
    igFeed = feedData.media || []
  } catch (e) {
    box.innerHTML = '<p style="color:#c0392b;font-size:13px;">載入失敗：' + esc(e.message) + '</p>'
    return
  }
  drawIgPlanner()
}

// 用背景圖渲染縮圖（避免破圖撐高，並可疊播放鍵）
function igThumbHTML(url, noimgText) {
  return url
    ? '<div class="ig-thumb" style="background-image:url(&quot;' + esc(url) + '&quot;)"></div>'
    : '<div class="ig-noimg">' + (noimgText || '—') + '</div>'
}

// 取得貼文封面與是否為影片：影片用 thumbnail_url（mp4 不能當圖），輪播取第一張子項
function igFeedThumb(m) {
  if (m.media_type === 'VIDEO') return { thumb: m.thumbnail_url || m.media_url || '', video: true }
  if (m.media_type === 'CAROUSEL_ALBUM') {
    var c = m.children && m.children.data && m.children.data[0]
    return { thumb: (c && (c.thumbnail_url || c.media_url)) || m.media_url || '', video: false }
  }
  return { thumb: m.media_url || m.thumbnail_url || '', video: false }
}

function drawIgPlanner() {
  var box = document.getElementById('igPlanner')
  if (!box) return
  var props = DATA.properties || []
  var byId = {}; props.forEach(function(p){ byId[p.id] = p })

  var planCells = igPlan.map(function(id, i) {
    var p = byId[id]; if (!p) return ''
    return '<div class="ig-cell ig-plan" draggable="true" data-i="' + i + '"' +
      ' ondragstart="igDragStart(event,' + i + ')" ondragover="event.preventDefault()" ondrop="igDrop(event,' + i + ')">' +
      igThumbHTML(igPropThumb(p), '無封面圖') +
      '<span class="ig-badge">草稿</span>' +
      '<button class="ig-del" title="移除" onclick="igRemoveFromPlan(' + i + ')">✕</button>' +
      '<span class="ig-cap">' + esc(p.title || '') + '</span>' +
      '</div>'
  }).join('')

  var rentedCount = 0
  var feedItems = igFeed.map(function(m) {
    var p = igMatchProperty(m.caption)
    var rented = !!(p && p.status === 'RENTED')
    if (rented) rentedCount++
    return { m: m, rented: rented }
  })
  var shownFeed = igShowRentedOnly ? feedItems.filter(function(x){ return x.rented }) : feedItems
  var feedCells = shownFeed.map(function(x) {
    var m = x.m
    var t = igFeedThumb(m)
    return '<a class="ig-cell ig-pub' + (x.rented ? ' ig-rented' : '') + '" href="' + esc(m.permalink || '#') + '" target="_blank" rel="noopener">' +
      igThumbHTML(t.thumb, '—') +
      (t.video ? '<span class="ig-play"></span>' : '') +
      (x.rented ? '<span class="ig-badge" style="background:#c0392b;">已出租 ⋯封存</span>' : '') +
      '<span class="ig-meta">❤ ' + (m.like_count || 0) + '　💬 ' + (m.comments_count || 0) + '</span>' +
      '</a>'
  }).join('')

  var addable = props.filter(function(p){ return p.status !== 'PENDING' && igPlan.indexOf(p.id) === -1 })
  var addOptions = addable.map(function(p){ return '<option value="' + p.id + '">' + esc(p.title) + '</option>' }).join('')

  box.innerHTML = [
    '<div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;">',
      '<select id="igAddSelect" style="flex:1;min-width:160px;padding:9px 12px;border:1.5px solid var(--oat-mid);border-radius:10px;font-size:13px;"><option value="">＋ 加入房源到規劃…</option>' + addOptions + '</select>',
      '<button class="btn" style="width:auto;padding:9px 18px;" onclick="igAddToPlan()">加入</button>',
    '</div>',
    igPlan.length ? '<div style="font-size:12px;color:var(--gray-mid);margin-bottom:6px;">規劃中（拖曳排序・上方＝最新）</div>' : '<p style="color:var(--gray-light);font-size:13px;margin-bottom:14px;">尚未加入任何房源到規劃。</p>',
    igPlan.length ? '<div class="ig-grid">' + planCells + '</div>' : '',
    igPlan.length ? '<div style="margin:12px 0 20px;"><button class="btn" style="width:auto;padding:11px 26px;" onclick="btnLoad(this, igPublishPlan)">🚀 依序發布規劃（' + igPlan.length + '）</button><span id="igPlanResult" style="margin-left:12px;font-size:13px;"></span></div>' : '',
    '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin:14px 0 6px;">',
      '<span style="font-size:12px;color:var(--gray-mid);">IG 已發布（連動・唯讀）' + (rentedCount ? '　🔴 ' + rentedCount + ' 篇對應已出租房源' : '') + '</span>',
      (rentedCount ? '<label style="font-size:12px;color:var(--charcoal);display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="checkbox" ' + (igShowRentedOnly ? 'checked' : '') + ' onchange="igShowRentedOnly=this.checked;drawIgPlanner()" style="accent-color:var(--sage);width:16px;height:16px;"> 只看已出租的貼文</label>' : ''),
    '</div>',
    igFeed.length ? '<div class="ig-grid">' + feedCells + '</div>' : '<p style="color:var(--gray-light);font-size:13px;">目前沒有抓到已發布貼文（帳號可能還沒發過文）。</p>',
    rentedCount ? '<p style="font-size:11px;color:var(--gray-light);margin-top:10px;line-height:1.7;">🔴 紅框「已出租」的貼文＝該房源已出租。點一下會打開那篇 IG 貼文，在 IG 右上「⋯ → 封存」即可把它從版面隱藏（封存後可隨時還原）。<b>IG 不開放由系統自動封存</b>，需在 IG 上點一下完成。</p>' : '',
  ].join('')
}

function igDragStart(e, i) { igDragFrom = i; try { e.dataTransfer.effectAllowed = 'move' } catch (_) {} }
function igDrop(e, i) {
  e.preventDefault()
  if (igDragFrom < 0 || igDragFrom === i) { igDragFrom = -1; return }
  var moved = igPlan.splice(igDragFrom, 1)[0]
  igPlan.splice(i, 0, moved)
  igDragFrom = -1
  saveIgPlan(); drawIgPlanner()
}
function igAddToPlan() {
  var s = document.getElementById('igAddSelect')
  var id = s && s.value
  if (!id) return
  if (igPlan.indexOf(id) === -1) { igPlan.push(id); saveIgPlan(); drawIgPlanner() }
}
function igRemoveFromPlan(i) { igPlan.splice(i, 1); saveIgPlan(); drawIgPlanner() }
async function saveIgPlan() {
  try {
    await fetch('/admin/api/social/ig/plan?key=' + encodeURIComponent(KEY), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ plan: igPlan }),
    })
  } catch (_) {}
}

async function igPublishPlan() {
  var resEl = document.getElementById('igPlanResult')
  if (!igPlan.length) return false
  if (!confirm('確定要依序發布這 ' + igPlan.length + ' 篇到 Instagram 嗎？發布後無法復原。')) return false
  // 由下而上（舊→新）送出，讓最終版面與九宮格預覽一致
  var order = igPlan.slice().reverse()
  var done = 0
  for (var k = 0; k < order.length; k++) {
    var p = (DATA.properties || []).filter(function(x){ return x.id === order[k] })[0]
    if (resEl) resEl.textContent = '發布中… (' + (k + 1) + '/' + order.length + ')'
    try {
      var res = await fetch('/admin/api/social/post?key=' + encodeURIComponent(KEY), {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ propertyId: order[k], platforms: ['instagram'], caption: buildSocialCaption(p) }),
      })
      var data = await res.json()
      var ok = res.ok && data.results && data.results.instagram && data.results.instagram.ok
      if (!ok) {
        var err = (data.results && data.results.instagram && data.results.instagram.error) || data.error || '發布失敗'
        if (resEl) resEl.innerHTML = '❌ 第 ' + (k + 1) + ' 篇失敗：' + esc(err) + '（已停止，後面未發）'
        break
      }
      done++
    } catch (e) {
      if (resEl) resEl.textContent = '❌ 連線失敗：' + e.message
      break
    }
  }
  // 成功的是原陣列尾端 done 篇，移出規劃清單
  if (done > 0) { igPlan = igPlan.slice(0, igPlan.length - done); saveIgPlan() }
  showToast('發布完成：成功 ' + done + ' 篇' + (done < order.length ? '，其餘未發' : ''))
  await renderIgPlanner()
  return true
}

async function submitSocialPost() {
  var resultEl = document.getElementById('socialPostResult')
  var platforms = Object.keys(socialSelectedPlatforms).filter(function(k){ return socialSelectedPlatforms[k] })
  var caption = (document.getElementById('socialCaption') || {}).value || ''
  if (!socialSelectedPropertyId) { showToast('❌ 請先選擇房源'); return false }
  if (!platforms.length) { showToast('❌ 請選擇至少一個發布平台'); return false }
  if (!caption.trim()) { showToast('❌ 發文內容不可空白'); return false }

  resultEl.innerHTML = '發布中...'
  try {
    var res = await fetch('/admin/api/social/post?key=' + encodeURIComponent(KEY), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ propertyId: socialSelectedPropertyId, platforms: platforms, caption: caption }),
    })
    var data = await res.json()
    if (!res.ok) { resultEl.innerHTML = '❌ ' + (data.error || '發布失敗'); return false }
    var labels = { instagram: 'Instagram', facebook: 'FB 粉專', threads: 'Threads' }
    resultEl.innerHTML = Object.keys(data.results).map(function(k) {
      var r = data.results[k]
      return r.ok
        ? '<div>✅ ' + labels[k] + '：發布成功</div>'
        : '<div>❌ ' + labels[k] + '：' + esc(r.error || '失敗') + '</div>'
    }).join('')
    showToast('已送出發布請求')
    return true
  } catch (e) {
    resultEl.innerHTML = '❌ 連線失敗：' + e.message
    return false
  }
}

function closeCommunityModal() {
  var m = document.getElementById('communityModal')
  if (m) m.remove()
  _editingCommunityId = null
}

function renderCommunityPhotoGrid() {
  var grid = document.getElementById('c_photo_grid')
  if (!grid) return
  grid.innerHTML = _communityPhotos.map(function(url, i) {
    return '<div style="position:relative;">' +
      '<img src="' + esc(url) + '" style="width:80px;height:60px;object-fit:cover;border-radius:8px;">' +
      '<button onclick="removeCommunityPhoto(' + i + ')" style="position:absolute;top:-6px;right:-6px;background:var(--danger);color:white;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;line-height:1;">×</button>' +
    '</div>'
  }).join('')
}

function removeCommunityPhoto(i) {
  _communityPhotos.splice(i, 1)
  renderCommunityPhotoGrid()
}

function handleCommunityDrop(e) {
  e.preventDefault()
  if (e.dataTransfer.files && e.dataTransfer.files.length) uploadCommunityPhotos(e.dataTransfer.files)
}

async function uploadCommunityPhotos(files) {
  var status = document.getElementById('c_upload_status')
  var arr = Array.from(files)
  var done = 0
  for (var f of arr) {
    if (status) status.textContent = '上傳中 ' + done + '/' + arr.length + '…'
    var fd = new FormData()
    fd.append('file', f)
    try {
      var res = await fetch('/admin/api/upload?key=' + encodeURIComponent(KEY), { method: 'POST', body: fd })
      var data = await res.json()
      if (res.ok && data.url) { _communityPhotos.push(data.url); done++ }
    } catch(e) {}
  }
  if (status) status.textContent = '✅ 已上傳 ' + done + ' 張'
  document.getElementById('c_file').value = ''
  renderCommunityPhotoGrid()
}

async function saveCommunity() {
  var name = (document.getElementById('c_name') || {}).value || ''
  var desc = (document.getElementById('c_desc') || {}).value || ''
  var mapUrl = (document.getElementById('c_map') || {}).value || ''
  if (!name.trim()) { showToast('❌ 請填寫社區名稱'); return }

  var url = _editingCommunityId
    ? '/admin/api/community/' + _editingCommunityId + '?key=' + encodeURIComponent(KEY)
    : '/admin/api/community?key=' + encodeURIComponent(KEY)

  try {
    var res = await fetch(url, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim(), description: desc, photos: _communityPhotos, mapUrl: mapUrl })
    })
    if (!res.ok) { var err = await res.json().catch(function(){ return {} }); showToast('❌ 儲存失敗：' + (err.error || res.status)); return }
    showToast(_editingCommunityId ? '✅ 已更新社區' : '✅ 已新增社區')
    closeCommunityModal()
    renderCommunityTab()
  } catch(e) { showToast('❌ 連線失敗：' + e.message) }
}

async function deleteCommunity(id) {
  if (!confirm('確定刪除此社區？房源的社區關聯也會清除。')) return
  try {
    var res = await fetch('/admin/api/community/' + id + '/delete?key=' + encodeURIComponent(KEY), {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}'
    })
    if (!res.ok) { showToast('❌ 刪除失敗'); return }
    showToast('🗑️ 已刪除社區')
    renderCommunityTab()
  } catch(e) { showToast('❌ 連線失敗') }
}

// ── 全域按鈕互動 ──────────────────────────────────────
// Ripple effect
document.addEventListener('click', function(e) {
  var btn = e.target.closest('.btn, .action-btn')
  if (!btn || btn.classList.contains('loading')) return
  var r = btn.getBoundingClientRect()
  var d = Math.max(r.width, r.height)
  var rEl = document.createElement('span')
  rEl.className = 'btn-ripple'
  rEl.style.cssText = 'width:' + d + 'px;height:' + d + 'px;left:' + (e.clientX - r.left - d/2) + 'px;top:' + (e.clientY - r.top - d/2) + 'px'
  btn.appendChild(rEl)
  setTimeout(function(){ rEl.remove() }, 500)
})

// Helper: wrap async onclick with loading state
function btnLoad(btn, fn) {
  if (btn.classList.contains('loading')) return
  btn.classList.add('loading')
  var orig = btn.textContent
  Promise.resolve(fn()).finally(function() {
    btn.classList.remove('loading')
  })
}

async function saveManaged(id) {
  var body = {
    title: val('m_title'), address: val('m_address'),
    ownerName: val('m_ownerName'), ownerPhone: val('m_ownerPhone'),
    ownerBankName: val('m_ownerBankName'), ownerBank: val('m_ownerBank'),
    roomCount: val('m_roomCount'), manageType: val('m_manageType'),
    feePercent: val('m_feePercent'),
    subleaseFeeType: val('m_subleaseFeeType'), subleaseFeeOther: val('m_subleaseFeeOther'),
    contractStart: val('m_contractStart'), contractEnd: val('m_contractEnd'),
  }
  if (!body.title || !body.ownerName) { showToast('❌ 社區名稱與屋主姓名必填'); return }
  var llSel = document.getElementById('m_landlordId')
  if (llSel) {
    if (!llSel.value) { showToast('❌ 請先選擇所屬房東／管理者'); return }
    body.landlordId = llSel.value
  }

  var url = id ? '/admin/api/managed/' + id : '/admin/api/managed'
  var res = await fetch(url + '?key=' + encodeURIComponent(KEY), {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  })
  if (!res.ok) {
    var d = await res.json().catch(function(){ return {} })
    showToast('❌ 儲存失敗：' + (d.error || ('HTTP ' + res.status)))
    return
  }
  showToast('✅ 已儲存')
  closeManagedModal()
  renderManagedTab()
}

  renderManagedTab()

var _uploadedContractFile = null
async function uploadContractFile(input, target) {
  if (!input.files || !input.files[0]) return
  var statusEl = document.getElementById('c_file_status')
  if (statusEl) statusEl.textContent = '上傳中...'
  var fd = new FormData(); fd.append('file', input.files[0])
